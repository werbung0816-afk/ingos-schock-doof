function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}

function showSummary(){
  if(!G||!G.lastResults||!G.lastResults.length)return;
  const modal=document.getElementById('modal-summary');
  // Always re-render — ensures guests see full content
  const c=document.getElementById('summary-content');c.innerHTML='';
  // Remove any previously inserted wait texts
  modal.querySelectorAll('.mp-wait-info').forEach(el=>el.remove());
  G.lastResults.forEach((r,rank)=>{
    const isBest=rank===0,isWorst=rank===G.lastResults.length-1;
    const p=G.players[r.playerIdx];
    const row=document.createElement('div');row.className='sum-row';
    const diceWrap=document.createElement('div');diceWrap.className='sum-dice';
    r.dice.forEach(d=>{if(d!==null)diceWrap.appendChild(makeDie(d,{size:'sm'}));});
    const nameEl=document.createElement('div');
    nameEl.className='sum-name'+(isBest?' best':isWorst?' worst':'');
    nameEl.textContent=p.name;
    const comboEl=document.createElement('div');comboEl.className='sum-combo';
    // Show combo clearly: type label + dice values only when informative
const dl=diceLabel(r.dice,r.combo);
if(r.combo.type==='schockAus') comboEl.textContent='Schock Aus';
else if(r.combo.type==='schock') comboEl.textContent=r.combo.label; // name already contains the value
else if(r.combo.type==='general') comboEl.textContent='General '+dl;
else if(r.combo.type==='strasse') comboEl.textContent='Straße '+dl;
else comboEl.textContent=dl; // simple: just show dice values
    const tagEl=document.createElement('div');tagEl.className='sum-tag';
    if(isBest)tagEl.innerHTML='<span style="color:#2ecc71">👑 Bester</span>';
    else if(isWorst){
      // Compute deckel received
      const bc=G.lastResults[0].combo;
      if(bc.type==='schockAus'){
        tagEl.innerHTML=`<span style="color:#e74c3c">Alle Deckel!</span>`;
      } else {
        const deckels=typeof bc.deckel==='number'?bc.deckel:0;
        const got=G.middleLids>0?Math.min(deckels,G.middleLids):deckels;
        tagEl.innerHTML=`<span style="color:#e74c3c">+${got} Deckel</span>`;
      }
    }
    row.append(nameEl,diceWrap,comboEl,tagEl);
    c.appendChild(row);
  });
  const msg=document.createElement('div');msg.className='sum-msg';msg.textContent=G.lastMsg||'';
  c.appendChild(msg);

  const btn=document.getElementById('btn-next-round');
  btn.style.display='block';btn.disabled=false; // reset first
  if(MP.on&&!MP.host){
    btn.style.display='none';
    btn.disabled=true;
    const info=document.createElement('div');
    info.className='mp-wait-info';
    info.style.cssText='text-align:center;padding:10px;font-size:12px;color:rgba(212,175,55,.5);font-family:Cinzel,serif;letter-spacing:2px';
    info.textContent='⏳ Warte auf nächste Runde…';
    btn.parentNode.insertBefore(info,btn);
  } else {
    btn.style.display='block';
    btn.disabled=false;btn.textContent='Nächste Runde →';btn.onclick=()=>{
      if(G.phase==='gameover'){closeModal('modal-summary');showGameOver();return;}
      if(G.phase==='halfend'){closeModal('modal-summary');showHalfEnd();}
      else startNextRound();
    };
  }

  openModal('modal-summary');
}

function showHalfEnd(){
  const t=document.getElementById('halfend-title');
  const c=document.getElementById('halfend-content');

  if(G.phase==='gameover'){closeModal('modal-halfend');showGameOver();return;}

  if(G.half===2&&G.halfLosers[0]!==null&&G.halfLosers[1]!==null&&G.halfLosers[0]!==G.halfLosers[1]){
    const l1=G.players[G.halfLosers[0]]?.name||'?';
    const l2=G.players[G.halfLosers[1]]?.name||'?';
    t.textContent='Finale!';
    c.innerHTML=`<b style="color:#e74c3c">${l2}</b> verliert die 2. Hälfte.<br><br>
      <b>${l1}</b> (1. Hälfte) und <b>${l2}</b> (2. Hälfte) spielen das <b style="color:var(--gold)">Finale</b>!`;
  } else {
    const loserIdx=G.half===1?G.halfLosers[0]:G.halfLosers[1];
    const loserName=loserIdx!==null?(G.players[loserIdx]?.name||'?'):'?';
    const halfLabel=G.half===1?'1.':'2.';
    t.textContent=`Ende der ${halfLabel} Hälfte`;
    c.innerHTML=`<b style="color:#e74c3c">${loserName}</b> verliert die ${halfLabel} Hälfte.<br><br>
      Weiter zur ${G.half===1?'2. Hälfte':'Finalrunde'}!`;
  }

  // btn-next-half: only host can advance
  const halfBtn=document.getElementById('btn-next-half');
  if(MP.on&&!MP.host){
    halfBtn.style.display='none';
    // Add wait text for non-host
    const existing=document.getElementById('halfend-wait');
    if(!existing){
      const w=document.createElement('div');w.id='halfend-wait';
      w.style.cssText='text-align:center;padding:8px;font-size:12px;color:rgba(212,175,55,.5);font-family:Cinzel,serif;letter-spacing:2px';
      w.textContent='⏳ Warte auf Host…';
      halfBtn.parentNode.insertBefore(w,halfBtn);
    }
  } else {
    halfBtn.style.display='block';
    const existing=document.getElementById('halfend-wait');
    if(existing)existing.remove();
  }

  closeModal('modal-summary');openModal('modal-halfend');
}

function showGameOver(){
  launchConfetti();playFanfare();
  const loserIdx=G.gameLoser;
  const loserName=G.players[loserIdx]?G.players[loserIdx].name:'?';
  const winners=G.players.filter((_,i)=>i!==loserIdx).map(p=>p.name);
  const winnersText=winners.length===1
    ?`${winners[0]} gewinnt`
    :`${winners.join(' und ')} gewinnen`;
  // Different text: both halves lost (kalt erwischt) vs Finale loser
  const doppelt=G.halfLosers[0]!==null&&G.halfLosers[1]!==null&&G.halfLosers[0]===G.halfLosers[1];
  const loserText=doppelt
    ?`Glückwunsch, kalt erwischt! ${loserName} bestellt für alle ein Wolters mit einem Lächeln. 🍺`
    :`${loserName} verliert die gesamte Runde und bestellt herzensgerne ein Wolters für alle. 🍺`;
  document.getElementById('gameover-content').innerHTML=
    `<b style="color:#e74c3c;font-size:17px">${loserText}</b><br><br>
     <span style="color:#2ecc71">${winnersText}! 🎉</span>`;
  closeModal('modal-summary');closeModal('modal-halfend');openModal('modal-gameover');
}

// ═══════════════════════════════════════════════
// SCREEN MANAGEMENT
// ═══════════════════════════════════════════════
function showScreen(name){
  document.querySelectorAll('.screen,[id^=screen-]').forEach(el=>{
    el.classList.remove('active');if(!el.classList.contains('screen'))el.style.display='none';
  });
  const el=document.getElementById('screen-'+name);
  if(!el)return;
  if(el.classList.contains('screen'))el.classList.add('active');
  else el.style.display='block';
  if(name==='lobby'&&_authReady)startOpenRoomsListener();
  else if(name!=='lobby')stopOpenRoomsListener();
}

let _orListenerHandle=null;
function startOpenRoomsListener(){
  const db=getDB();if(!db)return;
  if(_orListenerHandle)db.ref('open_rooms').off('value',_orListenerHandle);
  _orListenerHandle=db.ref('open_rooms').on('value',snap=>{
    const list=document.getElementById('open-rooms-list');
    const empty=document.getElementById('open-rooms-empty');
    if(!list)return;
    const data=snap.val();
    // Remove old chips
    list.querySelectorAll('.open-room-chip').forEach(c=>c.remove());
    if(!data||Object.keys(data).length===0){
      if(empty)empty.style.display='';
      return;
    }
    if(empty)empty.style.display='none';
    Object.values(data).sort((a,b)=>a.ts-b.ts).forEach(room=>{
      const chip=document.createElement('div');
      chip.className='open-room-chip';
      chip.innerHTML=`<span>${room.code}</span><span class="chip-np">${room.host} · ${room.NP}P</span>`;
      chip.addEventListener('click',()=>{
        document.getElementById('join-code').value=room.code;
        document.getElementById('join-code').focus();
      });
      list.appendChild(chip);
    });
  });
}
function stopOpenRoomsListener(){
  const db=getDB();if(!db||!_orListenerHandle)return;
  db.ref('open_rooms').off('value',_orListenerHandle);
  _orListenerHandle=null;
}

// ═══════════════════════════════════════════════
// LOBBY LOGIC
// ═══════════════════════════════════════════════
let selectedCount=3;

function buildNames(humanName,total){
  const usedLower=[humanName.toLowerCase()];
  // Build pool: all names not used by humans
  let pool=AI_POOL.filter(n=>!usedLower.includes(n.toLowerCase()));
  // Shuffle pool randomly
  for(let i=pool.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [pool[i],pool[j]]=[pool[j],pool[i]];
  }
  // Ensure Ingo is first AI if no human is named Ingo
  if(!usedLower.includes('ingo')){
    const ii=pool.findIndex(n=>n.toLowerCase()==='ingo');
    if(ii>0){const tmp=pool[ii];pool.splice(ii,1);pool.unshift(tmp);}
  }
  const names=[humanName];
  for(let i=1;i<total;i++) names.push(pool[i-1]||`KI${i}`);
  const ai=[false,...Array(total-1).fill(true)];
  return{names,ai};
}

function soloStart(){
  const name=(document.getElementById('solo-name').value.trim()||'Ingo').slice(0,16);
  const {names,ai}=buildNames(name,selectedCount);
  NP=selectedCount;ME=0;
  startGame(names,ai);
}

// ── MP CREATE ──
async function mpCreate(){
  const db=getDB();if(!db)return;
  const name=(document.getElementById('solo-name').value.trim()||'Ingo').slice(0,16);
  MP.myName=name;MP.host=true;MP.myIdx=0;MP.NP=selectedCount;ME=0;NP=selectedCount;
  MP.roomCode=String(Math.floor(1000+Math.random()*9000));
  MP.roomRef=db.ref('rooms/sd_'+MP.roomCode);
  const players=[{name,isAI:false},...Array(selectedCount-1).fill(null).map(()=>({name:'',isAI:false,empty:true}))];
  MP.players=players;
  await MP.roomRef.set({status:'waiting',NP:selectedCount,players,ts:Date.now()});
  // Register in open_rooms (best-effort — requires Firebase rules to allow this path)
  try{
    const orRef=db.ref('open_rooms/sd_'+MP.roomCode);
    await orRef.set({code:MP.roomCode,host:name,NP:selectedCount,ts:Date.now()});
    orRef.onDisconnect().remove();
    MP._orRef=orRef;
  }catch(e){console.warn('open_rooms write failed (check Firebase rules):',e);}
  document.getElementById('wt-code').textContent=MP.roomCode;
  document.getElementById('wt-url').textContent=location.href.split('?')[0]+'?join='+MP.roomCode;
  document.getElementById('btn-mp-start').style.display='block';
  showScreen('waiting');MP.listen();mpInitWaitChat();
  // Post room code to lobby
  try{var ldb=getDB();if(ldb)ldb.ref('rooms/sd_lobby').push({
    sender:(document.getElementById('solo-name')&&document.getElementById('solo-name').value.trim())||'Host',
    text:'Raum '+MP.roomCode+' ist offen — kommt rein! 🎲',ts:Date.now()
  });}catch(e){}
}

// ── MP JOIN ──
async function mpJoin(){
  const db=getDB();if(!db)return;
  const code=document.getElementById('join-code').value.trim();
  const name=(document.getElementById('solo-name').value.trim()||'Gast').slice(0,16);
  if(code.length!==4){alert('4-stelligen Code eingeben!');return;}
  MP.roomRef=db.ref('rooms/sd_'+code);MP.roomCode=code;
  const snap=await MP.roomRef.once('value');
  const room=snap.val();
  if(!room){alert('Raum nicht gefunden!');return;}
  if(room.status!=='waiting'){alert('Spiel läuft bereits!');return;}
  const rp=fixArr(room.players);
  const slot=rp.findIndex((p,i)=>i>0&&(!p||p.empty||!p.name));
  if(slot<0){alert('Raum ist voll!');return;}
  MP.myName=name;MP.myIdx=slot;ME=slot;MP.host=false;MP.NP=room.NP||3;NP=MP.NP;
  MP.on=true;
  rp[slot]={name,isAI:false};MP.players=rp;
  await MP.roomRef.child('players').set(rp);
  document.getElementById('wt-code').textContent=code;
  document.getElementById('wt-url').textContent=location.href.split('?')[0]+'?join='+code;
  showScreen('waiting');MP.listen();mpInitWaitChat();
}

function mpRenderWaiting(room){
  const players=room?fixArr(room.players):MP.players;
  const np=room?room.NP:MP.NP;
  const list=document.getElementById('wt-slots');list.innerHTML='';
  for(let i=0;i<np;i++){
    const p=players[i];const joined=p&&p.name&&!p.empty;
    const d=document.createElement('div');d.className='wt-slot';
    d.innerHTML=`<div class="wt-dot ${joined?'on':'off'}"></div>
      <span>${joined?p.name+(i===MP.myIdx?' (Du)':''):'Warte…'}</span>`;
    list.appendChild(d);
  }
  const n=players.filter(p=>p&&p.name&&!p.empty).length;
  document.getElementById('wt-sub').textContent=`${n} / ${np} Spieler`;
}

async function mpHostStart(){
  if(!MP.host||!MP.roomRef)return;
  const snap=await MP.roomRef.once('value');
  const room=snap.val();
  const np=room.NP||MP.NP;
  const rp=fixArr(room.players);
  const players=[];
  for(let i=0;i<np;i++)players[i]=rp[i]&&!rp[i].empty&&rp[i].name?{...rp[i],isAI:false}:null;
  const humanNames=players.filter(Boolean).map(p=>p.name.toLowerCase());
  let pool=AI_POOL.filter(n=>!humanNames.includes(n.toLowerCase()));
  // Shuffle
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
  // Ingo first if no human is Ingo
  if(!humanNames.includes('ingo')){const ii=pool.findIndex(n=>n.toLowerCase()==='ingo');if(ii>0){const t=pool[ii];pool.splice(ii,1);pool.unshift(t);}}
  let pi=0;
  for(let i=0;i<np;i++){
    if(!players[i])players[i]={name:pool[pi++%pool.length]||`KI${i}`,isAI:true};
  }
  MP.players=players;NP=np;MP.NP=np;ME=0;MP.on=true;
  const ladenStart=Math.floor(Math.random()*np); // randomize who rolls first
  G={
    phase:'laden',half:1,round:1,
    players:players.map(p=>({name:p.name,isAI:p.isAI,lids:0})),
    middleLids:TOTAL_LIDS,currentTurn:ladenStart,firstInRound:0,
    throwsAllowed:3,firstPlayerDone:false,
    playerStates:mkPS(np),
    ladenDice:Array(np).fill(null),
    ladenDone:Array(np).fill(false),
    ladenOrder:Array.from({length:np},(_,i)=>(i+ladenStart)%np),
    halfLosers:[null,null],markerHolder:null,finalists:[],
    lastResults:[],lastBest:-1,lastWorst:-1,lastMsg:'',gameLoser:null,
    message:'Laden — jeder würfelt einmal, höchste Zahl beginnt!',ts:Date.now()
  };
  await MP.roomRef.update({status:'playing',players,state:JSON.parse(JSON.stringify(G))});
  try{if(MP._orRef)MP._orRef.remove();}catch(e){}
  try{var ldb3=getDB();if(ldb3)ldb3.ref('rooms/sd_lobby').remove();}catch(e){}
  showScreen('game');render();MP.schedAI();
  initChat();
}

window.addEventListener('DOMContentLoaded',()=>{
  // Count buttons
  document.querySelectorAll('.seg-btn[data-count]').forEach(b=>{
    b.addEventListener('click',()=>{
      selectedCount=+b.dataset.count;
      document.querySelectorAll('.seg-btn[data-count]').forEach(x=>x.classList.toggle('on',x===b));
    });
  });

  document.getElementById('btn-create').addEventListener('click',()=>{ getDB(); _onAuthReady(mpCreate); });
  document.getElementById('btn-join').addEventListener('click',()=>{ getDB(); _onAuthReady(mpJoin); });
  document.getElementById('join-code').addEventListener('input',e=>{e.target.value=e.target.value.replace(/\D/g,'').slice(0,4);});
  document.getElementById('btn-mp-start').addEventListener('click',mpHostStart);
  document.getElementById('btn-leave').addEventListener('click',()=>{MP.stop();showScreen('lobby');});
  document.getElementById('btn-new-game').addEventListener('click',()=>{
    closeModal('modal-gameover');G=null;stopChat();MP.stop();showScreen('lobby');
  });
  document.getElementById('btn-next-half').addEventListener('click',()=>{
    if(MP.host||!MP.on)startNextHalf();
  });
  document.getElementById('btn-next-round').addEventListener('click',()=>{
    if(MP.on&&!MP.host)return;
    if(G&&G.phase==='halfend'){closeModal('modal-summary');showHalfEnd();}
    else startNextRound();
  });

  // Auto-join from URL
  const code=new URLSearchParams(location.search).get('join');
  if(code){document.getElementById('join-code').value=code;}

  showScreen('lobby');
  _onAuthReady(startOpenRoomsListener);
});
