<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Ingo's Schock Doof</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/firebase@10.8.1/firebase-app-compat.js"></script>
<script src="https://unpkg.com/firebase@10.8.1/firebase-database-compat.js"></script>
<script src="https://unpkg.com/firebase@10.8.1/firebase-auth-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --gold:#d4af37;--gold2:#edd060;--gold3:#9a7015;
  --bg:#020a04;--bg2:#060f07;--bg3:#0b1a0d;
  --red:#c0392b;--green:#27ae60;
  --text:#e8e0d0;--text2:rgba(232,224,208,.55);
}
body{background:var(--bg);font-family:'DM Sans',system-ui,sans-serif;color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-text-size-adjust:100%;}
/* ── SCREENS ── */
.screen{display:none;}
.screen.active{display:flex;min-height:100vh;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 40%,#0a1f0c 0%,var(--bg) 70%);}
#screen-game{display:none;}
#screen-game.active{display:block;min-height:100vh;background:linear-gradient(160deg,#020a04 0%,#060f07 55%,#040c05 100%);padding-bottom:50px;}

/* ── CARDS ── */
.card{background:linear-gradient(160deg,var(--bg3),#040e06);border:1px solid rgba(212,175,55,.25);border-radius:20px;padding:32px 36px;width:min(460px,94vw);box-shadow:0 40px 100px rgba(0,0,0,.8);}
.lb-lbl{font-family:'Cinzel',serif;font-size:10px;letter-spacing:4px;color:rgba(212,175,55,.5);margin-bottom:8px;margin-top:16px;}
.lb-input{width:100%;padding:12px 16px;border-radius:10px;border:1px solid rgba(212,175,55,.25);background:rgba(255,255,255,.04);color:var(--text);font-size:16px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;}
.lb-input:focus{border-color:rgba(212,175,55,.5);}
.seg{display:flex;gap:7px;margin-bottom:4px;}
.seg-btn{flex:1;padding:10px 6px;border-radius:8px;border:1px solid rgba(212,175,55,.2);background:rgba(255,255,255,.03);color:rgba(212,175,55,.5);font-size:13px;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;-webkit-tap-highlight-color:transparent;}
.seg-btn.on{background:rgba(212,175,55,.15);border-color:var(--gold);color:var(--gold);}
.divider{height:1px;background:rgba(212,175,55,.1);margin:18px 0;}
.btn-gold{display:block;width:100%;padding:14px;border-radius:10px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--gold3),var(--gold),var(--gold2));color:#1a0f00;font-weight:700;font-size:14px;font-family:'Cinzel',serif;letter-spacing:3px;transition:filter .2s,transform .1s;margin-top:12px;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
.btn-gold:hover{filter:brightness(1.1);}
.btn-gold:active{transform:scale(.98);}
.btn-ghost{display:block;width:100%;padding:11px;border-radius:8px;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.03);color:rgba(255,255,255,.3);cursor:pointer;font-size:13px;margin-top:8px;font-family:'DM Sans',sans-serif;}
.open-room-chip{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(212,175,55,.1);border:1px solid rgba(212,175,55,.3);
  border-radius:8px;padding:6px 12px;cursor:pointer;
  font-family:'Cinzel',serif;font-size:13px;font-weight:700;letter-spacing:3px;color:var(--gold);
  transition:background .2s;
}
.open-room-chip:hover{background:rgba(212,175,55,.2);}
.open-room-chip .chip-np{font-size:10px;color:rgba(212,175,55,.6);font-weight:400;letter-spacing:1px;}
.join-row .lb-input.code{flex:0 0 80px;letter-spacing:6px;text-align:center;font-size:20px;font-weight:700;}
.join-row .lb-input.name{flex:1;}
.join-row .btn-gold{margin-top:0;width:auto;padding:12px 16px;white-space:nowrap;}

/* ── WAITING ── */
.wt-codebox{background:rgba(212,175,55,.06);border:1px solid rgba(212,175,55,.2);border-radius:12px;padding:14px;margin-bottom:16px;text-align:center;}
.wt-codelbl{font-family:'Cinzel',serif;font-size:9px;letter-spacing:4px;color:rgba(212,175,55,.5);margin-bottom:6px;}
.wt-code{font-family:'Cinzel',serif;font-size:40px;font-weight:700;color:var(--gold);letter-spacing:14px;}
.wt-url{font-size:11px;color:var(--text2);margin-top:6px;word-break:break-all;}
.wt-slots{display:flex;flex-direction:column;gap:7px;margin-bottom:18px;}
.wt-slot{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:10px;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.05);}
.wt-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.wt-dot.on{background:#2ecc71;box-shadow:0 0 8px #2ecc71;}
.wt-dot.off{background:rgba(255,255,255,.12);}

/* ── HEADER ── */
header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 10px;border-bottom:1px solid rgba(212,175,55,.08);}
.logo-row{display:flex;align-items:center;gap:12px;}
.logo-ingos{font-family:'Cinzel',serif;font-size:9px;letter-spacing:5px;color:rgba(212,175,55,.5);}
.logo-main{font-family:'Cinzel',serif;font-size:26px;font-weight:900;letter-spacing:6px;color:var(--gold);line-height:1;}
.round-chip{font-family:'Cinzel',serif;font-size:10px;letter-spacing:4px;color:rgba(212,175,55,.6);border:1px solid rgba(212,175,55,.2);padding:4px 14px;border-radius:20px;}

/* ── MITTE ── */
.mitte-wrap{display:flex;align-items:center;justify-content:center;gap:16px;padding:14px 20px 6px;}
.mitte-box{background:rgba(255,255,255,.025);border:1px solid rgba(212,175,55,.15);border-radius:14px;padding:12px 24px;text-align:center;min-width:120px;}
.mitte-lbl{font-family:'Cinzel',serif;font-size:8px;letter-spacing:5px;color:rgba(212,175,55,.4);margin-bottom:4px;}
.mitte-num{font-size:42px;font-weight:700;color:var(--gold);line-height:1;margin-bottom:6px;}
.lid-dots{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;}
.lid-dot{width:11px;height:11px;border-radius:50%;border:1.5px solid rgba(212,175,55,.3);transition:all .3s;}
.lid-dot.filled{background:var(--gold);border-color:var(--gold);box-shadow:0 0 5px rgba(212,175,55,.4);}
.phase-badge{background:rgba(212,175,55,.1);border:1px solid rgba(212,175,55,.25);border-radius:20px;padding:6px 16px;font-family:'Cinzel',serif;font-size:11px;color:var(--gold);letter-spacing:2px;white-space:nowrap;}
.phase-badge.finale{background:rgba(231,76,60,.1);border-color:rgba(231,76,60,.3);color:#e74c3c;}

/* ── STATUS ── */
.status-bar{text-align:center;padding:5px 20px;font-size:13px;color:var(--text2);font-style:italic;min-height:28px;display:flex;align-items:center;justify-content:center;gap:6px;}
.s-dot{width:7px;height:7px;border-radius:50%;background:#2ecc71;box-shadow:0 0 8px #2ecc71;flex-shrink:0;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

/* ── PLAYER GRID ── */
.pgrid{display:grid;gap:10px;padding:0 14px;margin-bottom:12px;}
.pgrid.np2{grid-template-columns:1fr 1fr;}
.pgrid.np3{grid-template-columns:1fr 1fr 1fr;}
.pgrid.np4{grid-template-columns:1fr 1fr;gap:8px;}
@media(max-width:500px){.pgrid.np3{grid-template-columns:1fr 1fr;}}

.pcard{background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.05);border-radius:14px;padding:12px 14px;transition:all .25s;position:relative;min-height:90px;}
.pcard.active-turn{border-color:rgba(212,175,55,.4);background:rgba(212,175,55,.06);box-shadow:0 0 20px rgba(212,175,55,.07);}
.pcard.is-me{border-color:rgba(46,204,113,.15);}
.pcard.is-me.active-turn{border-color:rgba(46,204,113,.5);}
.pcard.has-marker{border-color:rgba(231,76,60,.25);}
.pcard.inactive-finale{opacity:.45;}
.pcard-header{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.pcard-name{font-size:13px;font-weight:600;color:rgba(232,224,208,.8);}
.tag{font-size:9px;padding:1px 6px;border-radius:4px;font-family:'Cinzel',serif;letter-spacing:1px;}
.tag.me{background:rgba(46,204,113,.1);color:#2ecc71;border:1px solid rgba(46,204,113,.2);}
.tag.marker{background:rgba(212,175,55,.1);color:var(--gold);border:1px solid rgba(212,175,55,.2);}
.pcard-throw{font-size:10px;color:rgba(255,255,255,.25);margin-bottom:5px;font-family:'Cinzel',serif;letter-spacing:1px;min-height:14px;}
.pcard-dice{display:flex;gap:4px;min-height:38px;margin-bottom:5px;align-items:center;flex-wrap:wrap;}
.pcard-combo{font-family:'Cinzel',serif;font-size:11px;letter-spacing:1px;min-height:14px;margin-bottom:3px;}
.pcard-combo.schockAus{color:#e74c3c;font-weight:700;}
.pcard-combo.schock{color:#e55039;}
.pcard-combo.general{color:var(--gold);}
.pcard-combo.strasse{color:#5dade2;}
.pcard-combo.simple{color:rgba(232,224,208,.4);}
.pcard-lids{font-size:24px;font-weight:700;color:var(--gold);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.lid-pips{display:flex;gap:3px;flex-wrap:wrap;align-items:center;max-width:120px;}
.lid-pip{width:7px;height:7px;border-radius:50%;background:var(--gold);opacity:.65;}
.lid-pip.red{background:#e74c3c;opacity:.8;}

/* ── DICE ── */
.die{width:38px;height:38px;border-radius:7px;background:#f5f0e8;border:1.5px solid #d4d0c8;display:inline-flex;align-items:center;justify-content:center;position:relative;transition:all .18s;box-shadow:0 3px 8px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.9);}
.die.lg{width:50px;height:50px;border-radius:9px;}
.die.sm{width:32px;height:32px;border-radius:6px;}
.die.kept{border:3px solid var(--gold) !important;box-shadow:0 0 0 3px rgba(212,175,55,.7),0 0 12px rgba(212,175,55,.4),0 3px 10px rgba(0,0,0,.3);}
.die.clickable{cursor:pointer;}
.die.clickable:hover{transform:translateY(-3px);filter:brightness(1.05);}
.die.back{background:linear-gradient(135deg,#1a3de6 0%,#1228a0 100%);border-color:rgba(255,255,255,.2);}
.die.back-neutral{background:linear-gradient(135deg,#1a1a2e 0%,#0d0d1a 100%);border-color:rgba(255,255,255,.08);}
.pip{position:absolute;border-radius:50%;background:#1a1a2e;}

/* ── CUP AREA ── */
.cup-area{background:rgba(0,0,0,.18);border:1px solid rgba(255,255,255,.05);border-radius:16px;margin:0 14px;padding:16px 18px 14px;}
.cup-lbl{font-family:'Cinzel',serif;font-size:9px;letter-spacing:4px;color:rgba(212,175,55,.35);margin-bottom:12px;}
.cup-row{display:flex;align-items:flex-start;gap:20px;}
.cup-icon{flex-shrink:0;cursor:pointer;transition:transform .1s;-webkit-tap-highlight-color:transparent;}
.cup-icon:active{transform:scale(.95);}
.cup-dice-area{flex:1;min-width:0;}
.my-dice{display:flex;gap:8px;flex-wrap:wrap;align-items:center;min-height:56px;}
.dice-hint{font-size:11px;color:rgba(255,255,255,.25);font-style:italic;margin-top:4px;line-height:1.4;}
.combo-lbl{font-family:'Cinzel',serif;font-size:13px;letter-spacing:2px;margin-top:5px;min-height:18px;}
.combo-lbl.schockAus{color:#e74c3c;font-weight:700;}
.combo-lbl.schock{color:#e55039;}
.combo-lbl.general{color:var(--gold);}
.combo-lbl.strasse{color:#5dade2;}
.throws-left{margin-top:8px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;color:rgba(212,175,55,.4);}
.action-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.btn-roll{-webkit-tap-highlight-color:transparent;touch-action:manipulation;padding:12px 22px;border-radius:10px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--gold3),var(--gold),var(--gold2));color:#1a0f00;font-weight:700;font-size:14px;font-family:'Cinzel',serif;letter-spacing:3px;transition:filter .2s,transform .1s;flex:1;max-width:220px;}
.btn-roll:disabled{opacity:.35;cursor:default;}
.btn-roll:not(:disabled):hover{filter:brightness(1.1);}
.btn-roll:not(:disabled):active{transform:scale(.98);}
.btn-sec{-webkit-tap-highlight-color:transparent;padding:10px 14px;border-radius:9px;border:1px solid rgba(212,175,55,.25);background:rgba(212,175,55,.06);color:rgba(212,175,55,.75);font-size:12px;font-family:'Cinzel',serif;letter-spacing:2px;cursor:pointer;transition:all .2s;}
.btn-sec:hover{background:rgba(212,175,55,.12);border-color:rgba(212,175,55,.4);}
.btn-drehen{background:rgba(231,76,60,.08);border-color:rgba(231,76,60,.35);color:#e07060;}
.btn-drehen:hover{background:rgba(231,76,60,.16)!important;}

/* ── MODALS ── */
.modal-bg{position:fixed;inset:0;background:rgba(2,6,3,.93);display:flex;align-items:center;justify-content:center;z-index:500;backdrop-filter:blur(8px);opacity:0;pointer-events:none;transition:opacity .25s;}
.modal-bg.open{opacity:1;pointer-events:all;}
.modal-box{background:linear-gradient(160deg,#0b1a0d,#070e08);border:1px solid rgba(212,175,55,.2);border-radius:20px;padding:28px 30px;min-width:300px;max-width:530px;width:92%;box-shadow:0 40px 100px rgba(0,0,0,.85);animation:fadeUp .25s ease;max-height:90vh;overflow-y:auto;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px) scale(.97);}to{opacity:1;transform:none;}}
.m-title{font-family:'Cinzel',serif;font-size:20px;font-weight:700;color:var(--gold);text-align:center;margin-bottom:20px;letter-spacing:3px;}

/* ── AUSWERTUNG ── */
.sum-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.05);}
.sum-name{min-width:65px;font-size:14px;font-weight:600;}
.sum-name.best{color:#2ecc71;}
.sum-name.worst{color:#e74c3c;}
.sum-dice{display:flex;gap:4px;flex-shrink:0;}
.sum-combo{flex:1;font-family:'Cinzel',serif;font-size:11px;color:rgba(212,175,55,.55);letter-spacing:1px;padding:0 4px;}
.sum-tag{font-size:12px;font-weight:600;white-space:nowrap;}
.sum-msg{text-align:center;padding:14px 0 2px;font-size:14px;color:var(--gold);font-weight:600;line-height:1.6;}

/* ── ANIMATIONS ── */
@keyframes dieIn{from{opacity:0;transform:translateY(-10px) scale(.8) rotate(15deg);}to{opacity:1;transform:none;}}
.die-in{animation:dieIn .28s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes shake{0%,100%{transform:rotate(0)}25%{transform:rotate(-8deg) translateX(-3px)}75%{transform:rotate(8deg) translateX(3px)}}
.shaking{animation:shake .38s ease;}

/* ── CONFETTI ── */
#confetti{position:fixed;inset:0;pointer-events:none;z-index:999;display:none;}

@media(max-width:600px){
  header{padding:4px 10px;}
  .card{padding:12px 14px;}
  .logo-main{font-size:16px;letter-spacing:2px;}
  #round-chip{font-size:8px;padding:3px 7px;}
  .mitte-wrap{padding:4px 8px 3px;gap:6px;}
  .mitte-num{font-size:24px;}
  .mitte-lbl{font-size:7px;}
  .lid-dot{width:8px;height:8px;margin:1px;}
  .half-badge{font-size:8px;padding:3px 7px;}
  #status-msg{font-size:11px;padding:2px 0;}
  .pgrid{padding:0 4px;gap:4px;}
  .pcard{padding:4px 7px !important;min-height:0 !important;border-radius:7px;}
  .pcard-name{font-size:10px !important;}
  .pcard-lids{font-size:13px !important;}
  .pcard-throw{font-size:8px;}
  .pgrid .die{width:18px !important;height:18px !important;border-radius:3px !important;}
  .cup-area{margin:0 4px;padding:6px 8px;}
  .cup-lbl{font-size:7px;letter-spacing:2px;}
  #cup-static,#cup-gif{width:52px !important;height:auto !important;max-height:60px !important;}
  #cup-static svg{width:52px !important;height:auto !important;}
  #my-dice .die{width:36px !important;height:36px !important;}
  .btn-roll{max-width:160px !important;padding:9px 10px;font-size:11px;}
  .btn-sec{padding:7px 8px;font-size:10px;}
  .action-row{gap:4px;margin-top:4px;}
  .card{padding:16px 14px;}
  #screen-game.active{padding-bottom:calc(50px + env(safe-area-inset-bottom,0px));}
}

/* ── CHAT ── */
#chat-wrap{
  position:fixed;bottom:0;left:0;right:0;z-index:300;
  display:none;flex-direction:column;
  background:rgba(3,10,4,.96);
  border-top:1px solid rgba(212,175,55,.18);
  box-shadow:0 -2px 16px rgba(0,0,0,.4);
}
#chat-wrap.active{display:flex;}
#chat-wrap.active{display:flex;}
#chat-toggle{
  align-self:flex-end;
  background:linear-gradient(135deg,var(--gold3),var(--gold));
  color:#1a0f00;border:none;border-radius:20px;padding:8px 16px;
  font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;
  cursor:pointer;font-weight:700;box-shadow:0 4px 14px rgba(0,0,0,.4);
  display:flex;align-items:center;gap:6px;
}
#chat-badge{
  background:#e74c3c;color:#fff;border-radius:50%;
  width:16px;height:16px;font-size:10px;display:none;
  align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;font-weight:700;
}
#chat-badge.has-new{display:flex;}
#chat-panel{
  background:linear-gradient(160deg,#0b1a0d,#070e08);
  border:1px solid rgba(212,175,55,.2);border-radius:14px;
  margin-bottom:8px;overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,.7);
  display:none;flex-direction:column;max-height:340px;
}
#chat-panel.open{display:flex;}
#chat-title{
  font-family:'Cinzel',serif;font-size:11px;letter-spacing:3px;
  color:rgba(212,175,55,.6);padding:10px 14px 8px;
  border-bottom:1px solid rgba(255,255,255,.05);
}
#chat-msgs{
  flex:1;overflow-y:auto;padding:10px 14px;
  display:flex;flex-direction:column;gap:6px;min-height:100px;
  scrollbar-width:thin;scrollbar-color:rgba(212,175,55,.2) transparent;
}
.chat-msg{font-size:13px;line-height:1.4;}
.chat-msg .cn{color:var(--gold);font-weight:600;margin-right:4px;}
.chat-msg .ct{color:var(--text2);}
.chat-msg.mine .cn{color:#2ecc71;}
#chat-input-row{display:flex;gap:6px;padding:8px 10px;border-top:1px solid rgba(255,255,255,.05);}
#chat-input{
  flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(212,175,55,.2);
  border-radius:8px;padding:7px 10px;color:var(--text);font-size:13px;
  font-family:'DM Sans',sans-serif;outline:none;
}
#chat-input:focus{border-color:rgba(212,175,55,.4);}
#chat-send{
  background:linear-gradient(135deg,var(--gold3),var(--gold));
  color:#1a0f00;border:none;border-radius:8px;padding:7px 12px;
  font-weight:700;cursor:pointer;font-size:13px;
}
#emoji-bar{
  display:flex;flex-wrap:wrap;gap:4px;padding:6px 10px 2px;
  border-bottom:1px solid rgba(255,255,255,.05);
}
.emoji-btn{
  background:none;border:none;cursor:pointer;font-size:18px;
  padding:2px 3px;border-radius:6px;transition:background .15s;
  line-height:1;-webkit-tap-highlight-color:transparent;
}
.emoji-btn:hover{background:rgba(255,255,255,.1);}
.emoji-btn:active{background:rgba(255,255,255,.2);}

</style>
</head>
<body>
<canvas id="confetti"></canvas>

<!-- LOBBY -->
<div id="screen-lobby" class="screen">
<div class="card">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
    <div style="position:relative;flex-shrink:0">
      <img id="ingo-logo" style="width:48px;height:48px;border-radius:50%;object-fit:cover;object-position:center 25%;border:2px solid var(--gold);box-shadow:0 0 14px rgba(212,175,55,.3);" src="" alt="Ingo">
      <div style="position:absolute;bottom:-2px;right:-2px;background:linear-gradient(135deg,var(--gold3),var(--gold));border-radius:50%;width:14px;height:14px;display:flex;align-items:center;justify-content:center;font-size:7px">★</div>
    </div>
    <div>
      <div style="font-family:'Cinzel',serif;font-size:8px;letter-spacing:5px;color:rgba(212,175,55,.55)">I N G O ' S</div>
      <div class="logo-main" style="font-family:'Cinzel',serif;font-size:20px;font-weight:900;letter-spacing:4px;color:var(--gold)">SCHOCK DOOF</div>

let chatOpen=false;
let chatListener=null;
let chatUnread=0;
let chatRef=null;

var chatPanelOpen=false;
function toggleChatPanel(){
  chatPanelOpen=!chatPanelOpen;
  var p=document.getElementById('chat-panel');
  if(p)p.style.display=chatPanelOpen?'flex':'none';
  if(chatPanelOpen){
    chatUnread=0;
    var badge=document.getElementById('chat-badge');
    if(badge){badge.style.display='none';}
    var msgs=document.getElementById('chat-msgs');
    if(msgs)msgs.scrollTop=msgs.scrollHeight;
  }
}

function initChat(){
  if(!MP.on||!MP.roomRef)return;
  chatRef=getDB().ref('rooms/sd_lobby'); // shared lobby path
  var wrap=document.getElementById('chat-wrap');
  if(wrap){wrap.style.display='flex';wrap.classList.add('active');}
  // Clear previous messages
  var msgs=document.getElementById('chat-msgs');if(msgs)msgs.innerHTML='';
  var bar=document.getElementById('chat-bar-text');if(bar)bar.textContent='Antippen zum Chatten…';
  // Fill emoji bar
  var eb=document.getElementById('emoji-bar');
  if(eb&&!eb.children.length){
    ['😁', '🥲', '😰', '🥳', '🫣', '🤔', '🤓', '🤪', '💩', '👌', '🥱', '🍻', '🍺', '😂', '🎲', '🙏', '👀', '🪩', '🕺', '😎', '🎁', '🧐', '🙌'].forEach(function(em){
      var b=document.createElement('button');b.className='emoji-btn';b.textContent=em;
      b.onclick=function(){var i=document.getElementById('chat-input');if(i){i.value+=em;i.focus();}};
      eb.appendChild(b);
    });
  }
  // Listen for new messages
  if(chatListener)chatRef.off('child_added',chatListener);
  chatListener=chatRef.on('child_added',snap=>{
    const msg=snap.val();
    if(!msg)return;
    appendChatMsg(msg);
    if(!chatOpen){
      chatUnread++;
      const badge=document.getElementById('chat-badge');
      badge.textContent=chatUnread>9?'9+':chatUnread;
      badge.classList.add('has-new');
    }
  });
}

function appendChatMsg(msg){
  // Store last msg globally for render()
  window._sdLastChat='💬 '+escHtml(msg.text)+' <span style="color:#d4af37;font-weight:600">— '+escHtml(msg.sender)+'</span>';
  // Update bar text
  var bar=document.getElementById('chat-bar-text');
  if(bar)bar.innerHTML='<span style="color:rgba(232,224,208,.85)">'+escHtml(msg.text)+'</span><span style="color:#d4af37;font-weight:700;margin-left:5px">— '+escHtml(msg.sender)+'</span>';
  // Flash bar
  var chatBar=document.getElementById('chat-bar');
  if(chatBar&&!chatPanelOpen){
    chatBar.style.background='rgba(212,175,55,.15)';
    setTimeout(function(){chatBar.style.background='';},2000);
  }
  // Append to list
  const div=document.createElement('div');
  div.className='chat-msg'+(msg.sender===MP.myName?' mine':'');
  div.innerHTML='<span class="ct">'+escHtml(msg.text)+'</span><span class="cn" style="margin-left:6px;">— '+escHtml(msg.sender)+'</span>';
  const msgs=document.getElementById('chat-msgs');
  if(msgs){msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;}
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function sendChat(){
  const inp=document.getElementById('chat-input');
  const text=inp.value.trim();
  if(!text||!chatRef)return;
  chatRef.push({sender:MP.myName,text,ts:Date.now()});
  inp.value='';
}

function stopChat(){
  if(chatRef&&chatListener)chatRef.off('child_added',chatListener);
  chatListener=null;chatRef=null;chatUnread=0;
  document.getElementById('chat-wrap').classList.remove('active');
  document.getElementById('chat-panel').classList.remove('open');
  document.getElementById('chat-msgs').innerHTML='';
  document.getElementById('chat-badge').classList.remove('has-new');
}

window.addEventListener('DOMContentLoaded',()=>{
  try{const s=localStorage.getItem('sd_player_name');if(s){const ni=document.getElementById('solo-name');if(ni)ni.value=s;}}catch(e){}
  getDB(); // init Firebase + anonymous auth early
  _onAuthReady(initLobbyChat);
  document.getElementById('chat-send').addEventListener('click',sendChat);
  document.getElementById('chat-input').addEventListener('keydown',e=>{
    if(e.key==='Enter')sendChat();
  });
});


function mpInitWaitChat(){
  const chatDiv=document.getElementById('wt-chat');
  if(!chatDiv||!MP.roomRef)return;
  chatDiv.style.display='flex';
  document.getElementById('wt-chat-msgs').innerHTML='';

  // Emoji bar
  const eb=document.getElementById('wt-emoji-bar');
  eb.innerHTML='';
  ['😁', '🥲', '😰', '🥳', '🫣', '🤔', '🤓', '🤪', '💩', '👌', '🥱', '🍻', '🍺', '😂', '🎲', '🙏', '👀', '🪩', '🕺', '😎', '🎁', '🧐', '🙌'].forEach(em=>{
    const b=document.createElement('button');
    b.className='emoji-btn';b.textContent=em;
    b.style.cssText='background:none;border:none;cursor:pointer;font-size:16px;padding:2px 3px;border-radius:5px;-webkit-tap-highlight-color:transparent;';
    b.addEventListener('click',()=>{
      const inp=document.getElementById('wt-chat-input');
      inp.value+=em;inp.focus();
    });
    eb.appendChild(b);
  });

  // Listen for chat messages
  getDB().ref('rooms/sd_lobby').limitToLast(20).on('child_added',snap=>{
    const msg=snap.val();if(!msg)return;
    const div=document.createElement('div');
    div.style.cssText='font-size:13px;line-height:1.4;';
    const mine=msg.sender===MP.myName;
    const col=mine?'#2ecc71':'#d4af37';
    const safeText=msg.text.replace(/&/g,'&amp;').replace(/</g,'&lt;');
    div.innerHTML=`<span style="color:rgba(232,224,208,.65);">${safeText}</span><span style="color:${col};font-weight:600;margin-left:6px;">— ${msg.sender}</span>`;
    const msgs=document.getElementById('wt-chat-msgs');
    if(msgs){msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;}
  });

  function sendWtChat(){
    const inp=document.getElementById('wt-chat-input');
    const text=inp.value.trim();if(!text||!MP.roomRef)return;
    getDB().ref('rooms/sd_lobby').push({sender:MP.myName||'?',text,ts:Date.now()});
    inp.value='';
  }
  const sendBtn=document.getElementById('wt-chat-send');
  const inp=document.getElementById('wt-chat-input');
  // Remove old listeners to avoid duplicates
  sendBtn.replaceWith(sendBtn.cloneNode(true));
  inp.replaceWith(inp.cloneNode(true));
  document.getElementById('wt-chat-send').addEventListener('click',sendWtChat);
  document.getElementById('wt-chat-input').addEventListener('keydown',e=>{if(e.key==='Enter')sendWtChat();});
}

// ── LOBBY CHAT ──
function initLobbyChat(){
  var db;try{db=getDB();}catch(e){return;}if(!db)return;
  var ref=db.ref('rooms/sd_lobby');
  var msgsEl=document.getElementById('lobby-chat-msgs');
  var inpEl=document.getElementById('lobby-chat-input');
  var sendEl=document.getElementById('lobby-chat-send');
  var emojiEl=document.getElementById('lobby-emoji-bar');
  if(!msgsEl||!inpEl||!sendEl)return;
  // Emoji bar
  if(emojiEl&&!emojiEl.children.length){
    ['😁', '🥲', '😰', '🥳', '🫣', '🤔', '🤓', '🤪', '💩', '👌', '🥱', '🍻', '🍺', '😂', '🎲', '🙏', '👀', '🪩', '🕺', '😎', '🎁', '🧐', '🙌'].forEach(function(em){
      var b=document.createElement('button');b.textContent=em;
      b.style.cssText='background:none;border:none;cursor:pointer;font-size:15px;padding:2px 3px;';
      b.onclick=function(){inpEl.value+=em;inpEl.focus();};
      emojiEl.appendChild(b);
    });
  }
  // Clear old, seed Ingo
  ref.remove(function(){
    ref.push({sender:'Ingo',text:'Na? Kannste auch nicht schlafen?',ts:Date.now()});
  });
  // Listen
  ref.limitToLast(20).on('child_added',function(snap){
    var msg=snap.val();if(!msg)return;
    var d=document.createElement('div');d.style.cssText='line-height:1.4;';
    var t=String(msg.text||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');
    var n=String(msg.sender||'?').replace(/&/g,'&amp;').replace(/</g,'&lt;');
    // Detect 4-digit code and make it clickable via data attribute
    var reCode=/\b(\d{4})\b/;
    var cm=t.match(reCode);
    if(cm){
      var c4=cm[1];
      var linked=t.replace(c4,'<b class="lobby-code" data-code="'+c4+'" style="color:#f0d060;cursor:pointer;border-bottom:1px solid #d4af37">'+c4+'</b>');
      d.innerHTML='<span>'+linked+'</span><span style="color:#d4af37;font-weight:600;margin-left:5px;">— '+n+'</span>';
    } else {
      d.innerHTML='<span>'+t+'</span><span style="color:#d4af37;font-weight:600;margin-left:5px;">— '+n+'</span>';
    }
        msgsEl.appendChild(d);msgsEl.scrollTop=msgsEl.scrollHeight;
  });
  function send(){
    var t=inpEl.value.trim();if(!t)return;
    var nm=(document.getElementById('solo-name')&&document.getElementById('solo-name').value.trim())||'Gast';
    ref.push({sender:nm,text:t,ts:Date.now()});inpEl.value='';
  }
  sendEl.onclick=send;
  inpEl.addEventListener('keydown',function(e){if(e.key==='Enter')send();});
  // Click on room code to fill join field
  msgsEl.addEventListener('click',function(e){
    var el=e.target.closest('.lobby-code');
    if(el){
      var jc=document.getElementById('join-code');
      if(jc){jc.value=el.dataset.code;jc.focus();}
    }
  });
}

function getDB(){

    try{
      if(!firebase.apps.length)firebase.initializeApp(FB_CFG);

const MP={
  on:false,host:false,myIdx:0,myName:'',NP:3,
  roomCode:null,roomRef:null,players:[],
  _listener:null,
  async push(){
    if(!this.on||!this.roomRef||!G)return;
    G.ts=Date.now();
    try{await this.roomRef.child('state').set(JSON.parse(JSON.stringify(G)));}catch(e){console.error(e);}
  },
  schedAI(){
    if(!this.on||!this.host||!G)return;
    const p=G.phase==='laden'?G.currentTurn:G.currentTurn;
    const pl=G.players&&G.players[p];
    if(pl&&pl.isAI){clearTimeout(aiTimer);aiTimer=setTimeout(()=>runAI(p),900);}
  },
  listen(){
    if(!this.roomRef)return;
    this._listener=this.roomRef.on('value',snap=>{
      const room=snap.val();if(!room)return;
      if(room.status==='waiting'){mpRenderWaiting(room);return;}
      if(room.status==='playing'&&room.state){
        NP=room.NP||MP.NP;
        if(room.players){
          const rp=fixArr(room.players);
          MP.players=rp;NP=rp.length;
          if(!MP.host){
            rp.forEach((p,i)=>{if(p&&p.name===MP.myName&&!p.isAI){MP.myIdx=i;ME=i;}});
          }
        }
        const raw=fixGS(room.state);
        if(!G||raw.ts>=(G.ts||0)){ // >= so host sees own echo
          // Detect rolls by others → play sound + animate cup on this device
          if(G&&G.playerStates&&raw.playerStates){
            for(let _pi=0;_pi<raw.playerStates.length;_pi++){
              if(_pi===ME)continue;
              const _oldT=(G.playerStates[_pi]&&G.playerStates[_pi].throwNum)||0;
              const _newT=(raw.playerStates[_pi]&&raw.playerStates[_pi].throwNum)||0;
              if(_newT>_oldT){
                playRoll();
                const _cup=document.getElementById('cup-static');
                const _gif=document.getElementById('cup-gif');
                if(_cup&&_gif){
                  _cup.style.display='none';_gif.style.display='block';
                  const _s=_gif.src;_gif.src='';_gif.src=_s;
                  clearTimeout(_gif._t);
                  _gif._t=setTimeout(()=>{_gif.style.display='none';_cup.style.display='block';},700);
                }
                break; // one sound per update is enough
              }
            }
          }
          const oldPhase=G?G.phase:'';
          G=raw;NP=G.players.length;
          showScreen('game');
          render();
          if(MP.on&&!document.getElementById('chat-wrap').classList.contains('active'))initChat();
          if(G.phase!==oldPhase||G.phase==='summary')handlePhaseChange(G.phase);
          if(MP.host)MP.schedAI();
        }
      }
    });
  },
  stop(){
    if(this.roomRef&&this._listener)this.roomRef.off('value',this._listener);
    if(this._orRef){try{this._orRef.remove();}catch(e){}}
    Object.assign(this,{on:false,host:false,roomRef:null,_listener:null,roomCode:null,players:[],myIdx:0,NP:3,_orRef:null});
  }
};

function fixArr(v){if(!v)return[];if(Array.isArray(v))return v;return Object.keys(v).sort((a,b)=>+a-+b).map(k=>v[k]);}
function fixGS(gs){
  if(!gs)return gs;
  const r={...gs};
  r.players=fixArr(gs.players).map(p=>({...p,lids:p.lids||0}));
  r.playerStates=fixArr(gs.playerStates).map(s=>({
    ...s,dice:fixArr(s.dice),kept:fixArr(s.kept),keptDice:fixArr(s.keptDice||[])
  }));
  // Normalize ladenDice: Firebase drops null entries, restore them as null
  const rawLaden=fixArr(gs.ladenDice||[]);
  r.ladenDice=Array.from({length:r.players.length},(_,i)=>rawLaden[i]??null);
  r.halfLosers=fixArr(gs.halfLosers||[null,null]);
  r.ladenOrder=fixArr(gs.ladenOrder||[]);
  // ladenDone: Firebase drops false entries too
  const rawDone=fixArr(gs.ladenDone||[]);
  r.ladenDone=Array.from({length:r.players.length},(_,i)=>rawDone[i]??false);
  if(gs.finalists)r.finalists=fixArr(gs.finalists);
  return r;
}

function handlePhaseChange(phase){
  if(phase==='summary'){
    // Guest always shows; host only if modal not already open
    if(!MP.host||!document.getElementById('modal-summary').classList.contains('open'))
      showSummary();
  }
  else if(phase==='halfend'){
    if(!MP.host||!document.getElementById('modal-halfend').classList.contains('open'))
      showHalfEnd();
  }
  else if(phase==='gameover'){
    closeModal('modal-halfend');
    // Guest: show summary first if dice results exist, then gameover after button click
    if(G&&G.lastResults&&G.lastResults.length>0){
      showSummary(); // summary btn-next-round will call showGameOver
    } else {
      closeModal('modal-summary');
      setTimeout(()=>showGameOver(),500);
    }
  }
  else{
    closeModal('modal-summary');
    closeModal('modal-halfend');

}

    diceAudioBuf=await ac.decodeAudioData(arr);
  }catch(e){console.warn('Audio load:',e);}
}
loadDiceAudio();
function playRoll(){
  try{
    const ac=getAC();if(!ac)return;
    if(diceAudioBuf){
      const src=ac.createBufferSource();
      src.buffer=diceAudioBuf;
      const g=ac.createGain();g.gain.value=0.9;
      src.connect(g);g.connect(ac.destination);
      src.start();
    }
  }catch(e){}
}
function playTick(){
  const ac=getAC();if(!ac)return;
  try{
    const o=ac.createOscillator(),g=ac.createGain();
    o.type='sine';o.frequency.value=1200;
    g.gain.setValueAtTime(0,ac.currentTime);g.gain.linearRampToValueAtTime(0.12,ac.currentTime+0.005);
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.07);
    o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+0.1);
  }catch(e){}
}
function playFanfare(){
  const ac=getAC();if(!ac)return;
  try{
    [[523,.1],[659,.18],[784,.26],[1047,.34]].forEach(([f,t])=>{
      const o=ac.createOscillator(),g=ac.createGain();
      o.type='sine';o.frequency.value=f;
      g.gain.setValueAtTime(0,ac.currentTime+t);g.gain.linearRampToValueAtTime(.18,ac.currentTime+t+.01);
      g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+t+.22);
      o.connect(g);g.connect(ac.destination);o.start(ac.currentTime+t);o.stop(ac.currentTime+t+.3);
    });
  }catch(e){}
}

function launchConfetti(){
  const cv=document.getElementById('confetti');cv.style.display='block';
  const cx=cv.getContext('2d');cv.width=innerWidth;cv.height=innerHeight;
  const cols=['#d4af37','#edd060','#2ecc71','#3498db','#e74c3c'];
  const ps=Array.from({length:130},()=>({
    x:Math.random()*cv.width,y:-20-Math.random()*cv.height*.5,
    w:5+Math.random()*9,h:3+Math.random()*5,
    c:cols[Math.floor(Math.random()*cols.length)],
    r:Math.random()*360,rv:(Math.random()-.5)*7,vy:2+Math.random()*3,vx:(Math.random()-.5)*2
  }));
  let frame=0;
  (function loop(){
    cx.clearRect(0,0,cv.width,cv.height);
    ps.forEach(p=>{
      cx.save();cx.translate(p.x+p.w/2,p.y+p.h/2);cx.rotate(p.r*Math.PI/180);
      cx.fillStyle=p.c;cx.globalAlpha=Math.max(0,1-frame/160);
      cx.fillRect(-p.w/2,-p.h/2,p.w,p.h);cx.restore();
      p.y+=p.vy;p.x+=p.vx;p.r+=p.rv;
    });
    if(++frame<180)requestAnimationFrame(loop);else cv.style.display='none';
  })();
}

// ═══════════════════════════════════════════════
// COMBINATION EVALUATOR
// ═══════════════════════════════════════════════
// rank: higher = better
// schockAus > schock6..3 > schock2(doof) > general6..2 > strasse456..123 > simple
function evalDice(d,keptCount=0){
  const s=[...d].sort((a,b)=>a-b);
  const [d1,d2,d3]=s;
  // Schock Aus (1-1-1)
  if(d1===1&&d2===1&&d3===1)
    return{type:'schockAus',label:'Schock Aus',deckel:'all',rank:1e9};
  // Schock (exactly two 1s)
  if(d1===1&&d2===1){
    const n=d3;
    return{type:'schock',label:n===2?'Schock Doof':`Schock ${n}`,deckel:n,rank:n*1e6+5e4+n,schockN:n};
  }
  // General: all same — always valid regardless of how achieved
  if(d1===d2&&d2===d3)
    return{type:'general',label:'General',deckel:3,rank:2e6+4e4+d1,genVal:d1};
  // Straße: consecutive — always valid regardless of how achieved
  if(d2===d1+1&&d3===d1+2)
    return{type:'strasse',label:'Straße',deckel:2,rank:2e6+3e4+d1,strasseLow:d1};
  // Simple: 100s value descending
  const desc=[...d].sort((a,b)=>b-a);
  const num=desc[0]*100+desc[1]*10+desc[2];
  return{type:'simple',label:`${desc[0]}-${desc[1]}-${desc[2]}`,deckel:1,rank:1e6+num,simpleNum:num};
}

// Compare two roll results: positive = a is BETTER
function compareRolls(a,b){
  if(a.combo.rank!==b.combo.rank)return a.combo.rank-b.combo.rank;
  if(a.throwNum!==b.throwNum)return b.throwNum-a.throwNum; // fewer throws wins
  return b.turnOrder-a.turnOrder; // earlier in round wins
}

function diceLabel(dice,combo){
  const s=[...dice].sort((a,b)=>b-a);
  return combo.type==='schock'||combo.type==='schockAus'?s.join('-'):
         combo.type==='general'?`${s[0]}-${s[0]}-${s[0]}`:
         combo.type==='strasse'?[...dice].sort((a,b)=>a-b).join('-'):
         s.join('-');
}

// GAME STATE
// ═══════════════════════════════════════════════
let G=null;
let aiTimer=null;
// G = {
//   phase:'laden'|'rolling'|'summary'|'halfend'|'gameover',
//   half:1|2|'finale',round:0,
//   players:[{name,isAI,lids}],
//   middleLids:13, currentTurn:0, firstInRound:0,
//   throwsAllowed:3, firstPlayerDone:false,
//   playerStates:[{dice,kept,keptDice,keptCount,throwNum,done,concealed,combo,turnOrder}],
//   ladenDice:[], halfLosers:[null,null], markerHolder:null,
//   finalists:[], // only in finale
//   lastResults:[], lastBest:idx, lastWorst:idx, lastMsg:'',
//   gameLoser:null, ts:0
// }

function mkPS(n){
  return Array.from({length:n},()=>({
    dice:[null,null,null],kept:[false,false,false],keptVisible:[false,false,false],keptDice:[],keptCount:0,
    throwNum:0,done:false,concealed:false,combo:null,turnOrder:-1,mustRollAfterDrehen:false
  }));
}

function startGame(names,aiFlags){
  NP=names.length;ME=0;
  // Randomize who rolls first in Laden
  const ladenStart=Math.floor(Math.random()*names.length);
  G={
    phase:'laden',half:1,round:1,
    players:names.map((n,i)=>({name:n,isAI:aiFlags[i],lids:0})),
    middleLids:TOTAL_LIDS,currentTurn:ladenStart,firstInRound:0,
    throwsAllowed:3,firstPlayerDone:false,
    playerStates:mkPS(NP),
    ladenDice:Array(NP).fill(null),
    ladenDone:Array(NP).fill(false),
    ladenOrder:Array.from({length:NP},(_,i)=>(i+ladenStart)%NP), // randomized order
    halfLosers:[null,null],markerHolder:null,finalists:[],
    lastResults:[],lastBest:-1,lastWorst:-1,lastMsg:'',gameLoser:null,
    message:'Laden — jeder würfelt einmal, höchste Zahl beginnt!',ts:Date.now()
  };
  showScreen('game');render();
  schedAI();
}

function schedAI(){
  clearTimeout(aiTimer);
  if(!G||G.phase==='gameover'||G.phase==='summary'||G.phase==='halfend')return;
  // Additional safety: if someone has all 13 lids, trigger gameover
  {const l13=G.players&&G.players.findIndex(p=>p.lids>=TOTAL_LIDS);
  if(l13>=0){G.phase='gameover';G.gameLoser=l13;showGameOver();return;}}
  if(MP.on&&!MP.host)return;
  const p=G.currentTurn;
  if(p===undefined||p===null||!G.players||!G.players[p])return;
  const activeParts=getParticipants();
  if(G.players[p].isAI&&activeParts.includes(p))
    aiTimer=setTimeout(()=>runAI(p),700+Math.random()*400);
}

// ═══════════════════════════════════════════════
// LADEN (initial: 1 die each, highest starts)
// ═══════════════════════════════════════════════
function doLaden(playerIdx){
  if(G.phase!=='laden')return;
  if(G.ladenDice[playerIdx]!==null)return;
  G.ladenDice[playerIdx]=Math.floor(Math.random()*6)+1;
  // Show GIF for laden roll too
  const _lcs=document.getElementById('cup-static');const _lcg=document.getElementById('cup-gif');
  if(_lcs&&_lcg){_lcs.style.display='none';_lcg.style.display='block';const _s=_lcg.src;_lcg.src='';_lcg.src=_s;clearTimeout(_lcg._t);_lcg._t=setTimeout(()=>{_lcg.style.display='none';_lcs.style.display='block';},700);}
  playRoll();
  // Shake cup anim
  document.getElementById('cup-icon').classList.add('shaking');
  setTimeout(()=>document.getElementById('cup-icon').classList.remove('shaking'),400);

  const allDone=G.ladenDice.every(d=>d!==null);
  if(allDone){
    // Show result for 1.5s, then start rolling
    let best=-1,bestVal=0;
    G.ladenDice.forEach((v,i)=>{if(v>bestVal){bestVal=v;best=i;}});
    G.message=`Höchste Zahl: ${G.players[best]?.name} mit ${G.ladenDice[best]}! beginnt die Runde.`;
    if(MP.on)MP.push();
    render();
    setTimeout(()=>{
      if(!G||G.phase!=='laden')return;
      G.currentTurn=best;G.firstInRound=best;G.phase='rolling';
      G.playerStates=mkPS(NP);
      G.message=`${G.players[best]?.name} beginnt — würfel!`;
      if(MP.on)MP.push();
      render();schedAI();
    },1800);
    return;
  } else {
    // Find next in randomized laden order
    const nextInOrder=(G.ladenOrder||[]).find(i=>G.ladenDice[i]===null);
    const next=nextInOrder!==undefined?nextInOrder:G.ladenDice.findIndex(d=>d===null);
    G.currentTurn=next;
    G.message=G.players[next]?`${G.players[next].name} würfelt…`:'';
  }
  if(MP.on)MP.push();
  render();
  schedAI();
}

// ═══════════════════════════════════════════════
// ROLLING MECHANICS
// ═══════════════════════════════════════════════
function canDrehen(ps){
  const throwsLeft=G.throwsAllowed-(ps.throwNum||0);
  if(throwsLeft<=0)return false;
  const sixesInCurrent=ps.dice.filter((d,i)=>!ps.kept[i]&&d===6).length;
  return sixesInCurrent>=2;
}

function doDrehen(playerIdx){
  if(G.currentTurn!==playerIdx||G.phase!=='rolling')return;
  const ps=G.playerStates[playerIdx];
  if(ps.done||!canDrehen(ps))return;
  // Find first two non-kept 6s
  const newDice=[...ps.dice],newKept=[...ps.kept];
  let converted=0;
  for(let i=0;i<3&&converted<2;i++){
    if(!newKept[i]&&newDice[i]===6){
      if(converted===0){newDice[i]=1;newKept[i]=true;} // first 6 → 1 (kept)
      // second 6 stays in pool (will be re-rolled next throw)
      converted++;
    }
  }
  ps.dice=newDice;ps.kept=newKept;
  ps.keptDice=newDice.filter((_,i)=>newKept[i]);
  ps.keptCount=ps.keptDice.length;
  ps.combo=evalDice(newDice,ps.keptCount);
  ps.mustRollAfterDrehen=true; // MUST roll again — freed 6 still in cup
  if(G.players[playerIdx])G.message=`${G.players[playerIdx]?.name} dreht zwei Sechsen zur Eins — muss nochmal würfeln!`;
  playTick();
  if(MP.on)MP.push();
  render();
}

function doRoll(playerIdx){
  if(G.currentTurn!==playerIdx||G.phase!=='rolling')return;
  const ps=G.playerStates[playerIdx];
  if(ps.done)return;
  const throwsLeft=G.throwsAllowed-(ps.throwNum||0);
  if(throwsLeft<=0)return;
  // Roll non-kept dice
  const newDice=[...ps.dice];
  let rolled=0;
  for(let i=0;i<3;i++){
    if(!ps.kept[i]){newDice[i]=Math.floor(Math.random()*6)+1;rolled++;}
  }
  if(rolled===0)return;
  ps.dice=newDice;
  ps.throwNum=(ps.throwNum||0)+1;
  ps.mustRollAfterDrehen=false; // rolled → obligation fulfilled
  // Track which dice are visibly kept (for other players to see)
  ps.keptVisible=[...ps.kept];
  ps.keptDice=newDice.filter((_,i)=>ps.kept[i]);
  ps.keptCount=ps.keptDice.length;
  ps.combo=evalDice(newDice,ps.keptCount);
  if(G.players[playerIdx])G.message=`${G.players[playerIdx]?.name} würfelt (${ps.throwNum}/${G.firstPlayerDone?G.throwsAllowed:3})…`;

  // Show GIF while rolling, revert to SVG after
  const _cs=document.getElementById('cup-static');
  const _cg=document.getElementById('cup-gif');
  if(_cs&&_cg){
    _cs.style.display='none';
    _cg.style.display='block';
    // Restart GIF
    const _src=_cg.src;_cg.src='';_cg.src=_src;
    clearTimeout(_cg._t);
    _cg._t=setTimeout(()=>{_cg.style.display='none';_cs.style.display='block';},700);
  }
  document.getElementById('cup-icon').classList.add('shaking');
  setTimeout(()=>document.getElementById('cup-icon').classList.remove('shaking'),400);
  playRoll();

  if(MP.on)MP.push();
  render();
  // Auto-finish human player after last throw — no Fertig button needed
  if(playerIdx===ME&&ps.throwNum>=G.throwsAllowed){
    setTimeout(()=>{
      if(!G||G.phase!=='rolling')return;
      if(!G.playerStates||!G.playerStates[playerIdx]||G.playerStates[playerIdx].done)return;
      if(G.playerStates[playerIdx].mustRollAfterDrehen)return; // must roll again first
      doFinish(playerIdx,false);
    },700);
  }
}



function getParticipants(){
  // Finale: only the two half-losers
  if(G.half==='finale'&&G.finalists&&G.finalists.length) return G.finalists.filter(x=>x!=null&&x>=0&&x<G.players.length);
  // Phase 2 (Mitte empty): only players WITH lids participate
  if(G.middleLids===0) return Array.from({length:NP},(_,i)=>i).filter(i=>G.players[i].lids>0);
  // Phase 1: everyone participates
  return Array.from({length:NP},(_,i)=>i);
}

function resolveRound(){
  const participants=getParticipants();
  if(participants.length<2){
    // Only one player with lids — they win the half automatically? 
    // Actually shouldn't happen but guard it
    G.lastResults=[];G.lastMsg='Nur ein Spieler hat noch Deckel.';
    return;
  }
  const results=participants.map(i=>({
    playerIdx:i,
    combo:G.playerStates[i].combo||evalDice(G.playerStates[i].dice,G.playerStates[i].keptCount),
    throwNum:G.playerStates[i].throwNum,
    turnOrder:G.playerStates[i].turnOrder,
    dice:[...G.playerStates[i].dice]
  }));
  // Sort best first (descending)
  results.sort((a,b)=>compareRolls(b,a));
  G.lastResults=results;
  const best=results[0],worst=results[results.length-1];
  G.lastBest=best.playerIdx;G.lastWorst=worst.playerIdx;

  if(best.combo.type==='schockAus'){
    const all=G.middleLids+G.players.reduce((s,p)=>s+p.lids,0);
    G.players.forEach((p,i)=>{p.lids=i===worst.playerIdx?all:0;});
    G.middleLids=0;
    G.lastMsg=`Schock Aus! ${G.players[worst.playerIdx]?.name} bekommt alle ${all} Deckel!`;
    G.phase='summary'; // show summary first before checkHalfEnd changes phase
    checkHalfEnd(worst.playerIdx);return;
  }

  const deckels=typeof best.combo.deckel==='number'?best.combo.deckel:TOTAL_LIDS;
  if(G.middleLids>0){
    const tr=Math.min(deckels,G.middleLids);
    G.players[worst.playerIdx].lids+=tr;G.middleLids-=tr;
    G.lastMsg=`${G.players[best.playerIdx]?.name} würfelt ${best.combo.label} — ${G.players[worst.playerIdx]?.name} bekommt ${tr} Deckel aus der Mitte.`;
  } else {
    const avail=G.players[best.playerIdx].lids;
    const tr=Math.min(deckels,avail);
    G.players[best.playerIdx].lids-=tr;G.players[worst.playerIdx].lids+=tr;
    G.lastMsg=`${G.players[best.playerIdx]?.name} würfelt ${best.combo.label} — gibt ${tr} Deckel an ${G.players[worst.playerIdx]?.name}.`;
  }
  checkHalfEnd(worst.playerIdx);
}

function doKeepToggle(playerIdx,dieIdx){
  if(G.currentTurn!==playerIdx||G.phase!=='rolling')return;
  const ps=G.playerStates[playerIdx];
  if(ps.done||ps.throwNum===0||ps.dice[dieIdx]===null)return;
  ps.kept[dieIdx]=!ps.kept[dieIdx];
  ps.keptDice=ps.dice.filter((_,i)=>ps.kept[i]);
  ps.keptCount=ps.keptDice.length;
  playTick();
  if(MP.on)MP.push();
  render();
}

function checkHalfEnd(loserIdx){
  if(G.players[loserIdx].lids<TOTAL_LIDS)return;
  if(G.half===1){
    G.halfLosers[0]=loserIdx;G.markerHolder=loserIdx;
    // Phase stays 'summary' so guest sees dice results first
    // showSummary will detect halfend and show that modal after button click
    G.phase='halfend'; // will be shown after summary modal
  } else if(G.half===2){
    G.halfLosers[1]=loserIdx;
    if(G.halfLosers[0]===G.halfLosers[1]){G.phase='gameover';G.gameLoser=loserIdx;}
    else{G.phase='halfend';}
  } else {
    // Finale
    G.phase='gameover';G.gameLoser=loserIdx;
  }
}

function startNextRound(){
  G.round++;G.phase='rolling';
  // Ensure firstInRound/currentTurn is a valid participant (has lids in Phase 2)
  let nextFirst=G.lastWorst>=0?G.lastWorst:G.firstInRound;
  const nextParts=getParticipants();
  if(!nextParts.includes(nextFirst)) nextFirst=nextParts[0]||0;
  G.firstInRound=nextFirst;
  G.currentTurn=nextFirst;
  NP=G.players.length;
  G.playerStates=mkPS(NP);
  G.throwsAllowed=3;G.firstPlayerDone=false;
  G.message=G.players[G.currentTurn]?`${G.players[G.currentTurn].name} ist am Zug…`:'';
  if(MP.on)MP.push();
  closeModal('modal-summary');render();schedAI();
}

function startNextHalf(){
  if(!G||G.phase==='gameover')return; // guard against double-call
  if(G.half===1){
    G.half=2;
    G.players.forEach(p=>p.lids=0);G.middleLids=TOTAL_LIDS;G.round=0;
    const st=G.halfLosers[0]??0; // fallback to player 0 if not set
    G.firstInRound=st;G.currentTurn=st;G.phase='rolling';
    NP=G.players.length;
    G.playerStates=mkPS(NP);G.throwsAllowed=3;G.firstPlayerDone=false;
    G.message=`2. Hälfte — ${G.players[st]?.name||'?'} beginnt.`;
  } else {
    // Finale
    G.half='finale';
    G.players.forEach(p=>p.lids=0);G.middleLids=TOTAL_LIDS;G.round=0;
    const st=G.halfLosers[1]??G.halfLosers[0]??0; // H2 loser starts (null-safe)
    G.finalists=[G.halfLosers[0],G.halfLosers[1]].filter(x=>x!=null&&x>=0);
    G.firstInRound=st;G.currentTurn=st;G.phase='rolling';
    NP=G.players.length;
    G.playerStates=mkPS(NP);G.throwsAllowed=3;G.firstPlayerDone=false;
    G.message=`Finale — ${G.players[st]?.name||'?'} beginnt.`;
  }
  G.round++;
  if(MP.on)MP.push();
  closeModal('modal-halfend');render();schedAI();
}


function doFinish(playerIdx,concealed){
  if(G.phase!=='rolling')return;
  const ps=G.playerStates[playerIdx];
  if(ps.done||ps.throwNum===0)return;
  if(ps.mustRollAfterDrehen)return; // must roll again after Drehen — unconditional
  ps.done=true;ps.concealed=concealed;
  ps.turnOrder=G.playerStates.filter(s=>s.done).length;
  // First player locks throwsAllowed for the round
  if(playerIdx===G.firstInRound&&!G.firstPlayerDone){
    G.throwsAllowed=ps.throwNum;G.firstPlayerDone=true;
  }
  G.message=G.players[playerIdx]?`${G.players[playerIdx].name} ist fertig.`:'Fertig.';
  // Determine next player
  const participants=getParticipants();
  const fi=Math.max(0,participants.indexOf(G.firstInRound));
  const order=participants.map((_,k)=>participants[(fi+k)%participants.length]);
  const next=order.find(i=>i!=null&&i>=0&&G.playerStates[i]&&!G.playerStates[i].done);
  if(next===undefined){
    G.phase='summary';
    resolveRound();
  } else {
    G.currentTurn=next;
    G.message=G.players[next]?`${G.players[next].name} ist am Zug…`:'';
  }
  if(MP.on)MP.push();
  render();
  // Show modal immediately for everyone (host + solo)
  // Guests will also show via handlePhaseChange when Firebase state arrives
  if(G.phase==='gameover'){
    if(G.lastResults&&G.lastResults.length>0) showSummary();
    else setTimeout(()=>showGameOver(),300);
    if(MP.on)MP.push();
    return;
  }
  if(G.phase==='summary'||G.phase==='halfend'){
    showSummary();
    if(MP.on)MP.push();
  } else {
    if(MP.on)MP.push();
    schedAI();
  }
}

// ═══════════════════════════════════════════════
// AI — single timer, no race conditions
// ═══════════════════════════════════════════════
function runAI(pi){
  // Guard: validate state before any action
  if(!G||G.phase==='gameover'||G.phase==='halfend'||G.phase==='summary')return;
  if(MP.on&&!MP.host)return;
  if(pi===undefined||pi===null||!G.players||pi>=G.players.length)return;
  const player=G.players[pi];
  if(!player||!player.isAI)return;
  if(G.phase==='laden'){doLaden(pi);return;}
  if(G.phase!=='rolling'||G.currentTurn!==pi)return;
  if(!G.playerStates||!G.playerStates[pi])return;
  const ps=G.playerStates[pi];
  if(ps.done)return;

  // First throw
  if(ps.throwNum===0){
    doRoll(pi);
    aiTimer=setTimeout(()=>runAI(pi),900);
    return;
  }

  const throwsLeft=G.throwsAllowed-ps.throwNum;
  const combo=ps.combo;

  // Drehen if eligible
  if(canDrehen(ps)&&throwsLeft>0){
    doDrehen(pi);
    aiTimer=setTimeout(()=>runAI(pi),650);
    return;
  }

  // Schock Aus → sofort fertig
  if(combo&&combo.type==='schockAus'){doFinish(pi,false);return;}

  // Probabilistische Entscheidung — NICHT wenn Pflicht-Wurf nach Drehen aussteht
  if(!ps.mustRollAfterDrehen&&aiShouldStopEarly(pi,ps)){doFinish(pi,false);return;}

  // No throws left → finish
  if(throwsLeft<=0){doFinish(pi,false);return;}

  // Roll again
  aiMarkKeep(pi);
  aiTimer=setTimeout(()=>{
    if(!G||G.phase!=='rolling'||G.currentTurn!==pi||G.playerStates[pi].done)return;
    const ps2=G.playerStates[pi];
    const toRoll=ps2.dice.filter((_,i)=>!ps2.kept[i]).length;
    if(toRoll===0){doFinish(pi,false);return;}
    doRoll(pi);
    aiTimer=setTimeout(()=>runAI(pi),900);
  },420);
}

// ── RETRY SYNC ──
// Startet hängengebliebene KI neu — funktioniert in Laden- und Rolling-Phase
function retrySync(){
  clearTimeout(aiTimer);
  if(!G)return;
  const pi=G.currentTurn;
  if((G.phase==='laden'||G.phase==='rolling')&&G.players&&G.players[pi]&&G.players[pi].isAI){
    aiTimer=setTimeout(()=>runAI(pi),300);
  }
  if(MP.on&&MP.host){G.ts=Date.now();MP.push();}
  render();
}

// ── PROBABILISTISCHE KI-ENTSCHEIDUNG ──────────────────────────────
// Rangverteilung aller 216 Würfelergebnisse — lazy initialized beim ersten Aufruf
let _allRanks216=null;
function getAllRanks(){
  if(!_allRanks216){
    _allRanks216=[];
    for(let a=1;a<=6;a++)for(let b=1;b<=6;b++)for(let c=1;c<=6;c++)
      _allRanks216.push(evalDice([a,b,c]).rank);
    _allRanks216.sort((x,y)=>x-y);
  }
  return _allRanks216;
}

// Welchen Anteil aller 216 Ergebnisse schlägt dieser Rang? (0=schlecht, 1=gut)
function calcRankPercentile(rank){
  const ranks=getAllRanks();
  let lo=0;for(const r of ranks)if(r<=rank)lo++;
  return lo/ranks.length;
}

// Welche Würfel würde die KI behalten? (alle Einsen + bereits behaltene)
function getWouldKeep(ps){
  return ps.dice.map((d,i)=>!!(ps.kept[i]||(d===1)));
}

// P(nächster Wurf ergibt besseren Rang) — exakte Enumeration aller Möglichkeiten
function calcPImprove(ps){
  try{
    if(!ps||!ps.combo||!ps.dice)return 0;
    const cur=ps.combo.rank;
    const wk=getWouldKeep(ps);
    const kept=ps.dice.filter((d,i)=>wk[i]&&d!=null);
    const nRoll=3-kept.length;
    if(nRoll<=0)return 0;
    let better=0,total=0;
    function go(n,acc){
      if(!n){if(evalDice([...kept,...acc]).rank>cur)better++;total++;return;}
      for(let v=1;v<=6;v++)go(n-1,[...acc,v]);
    }
    go(nRoll,[]);
    return total>0?better/total:0;
  }catch(e){return 0;}
}

// Dringlichkeit der KI sich zu verbessern (0=entspannt, 1=höchste Not)
function calcUrgency(pi,combo){
  try{
    if(!G||!G.players)return 0.5;
    const myLids=(G.players[pi]?.lids)||0;
    const allLids=G.players.map(p=>(p?.lids)||0);
    const maxLids=Math.max(...allLids,1);
    const minLids=Math.min(...allLids,0);
    const spread=Math.max(maxLids-minLids,1);
    const lidsRisk=(myLids-minLids)/spread;
    const resultRisk=1-calcRankPercentile(combo.rank);
    const phaseFactor=G.half==='finale'?1.25:G.half===2?1.1:1.0;
    const middleBonus=(G.middleLids===0)?0.12:0;
    return Math.min(1,Math.max(0,(lidsRisk*0.35+resultRisk*0.50+middleBonus)*phaseFactor));
  }catch(e){return 0.5;}
}

// Kernentscheidung: jetzt aufhören oder nochmal würfeln?
// urgency=0: >70% Verbesserungschance nötig  urgency=1: >7% reicht
// Wird NICHT aufgerufen wenn mustRollAfterDrehen=true
function aiShouldStopEarly(pi,ps){
  try{
    if(!ps||ps.throwNum===0)return false;
    const combo=ps.combo;if(!combo)return false;
    const throwsLeft=(G.throwsAllowed||3)-(ps.throwNum||0);
    if(throwsLeft<=0)return true;
    if(combo.type==='schockAus')return true;

    const myLids=(G.players[pi]?.lids)||0;
    const middleEmpty=G.middleLids===0;
    const isFirst=pi===G.firstInRound&&!G.firstPlayerDone;

    // ── EXPLIZITE OVERRIDES (aus Spielerfahrung) ──────────────────

    // Schock 5+ bei voller Mitte → immer auf Aus spielen
    if(combo.type==='schock'&&combo.schockN>=5&&!middleEmpty)return false;

    // Straße 4-5-6 → immer stehen lassen
    if(combo.type==='strasse'&&combo.strasseLow>=4)return true;

    // Straße 1-2-3 oder 2-3-4 → immer weiterwürfeln
    if(combo.type==='strasse'&&combo.strasseLow<=2)return false;

    // Simple als erster Spieler → 30% stehen lassen (Bremsstrategie)
    if(combo.type==='simple'&&isFirst&&Math.random()<0.30)return true;

    // 0 Deckel + Mitte leer + Schock 4+ → stehen (nichts zu gewinnen, Solidarität)
    if(myLids===0&&middleEmpty&&combo.type==='schock'&&combo.schockN>=4)return true;

    // ── PROBABILISTISCHE ENTSCHEIDUNG für alle anderen Fälle ──────
    const pImprove=calcPImprove(ps);
    const urgency=calcUrgency(pi,combo);
    const baseThr=0.70-urgency*0.63;
    const threshold=throwsLeft>1?baseThr*0.88:baseThr;
    return pImprove<threshold;
  }catch(e){return false;}
}

function aiMarkKeep(pi){
  const ps=G.playerStates[pi];
  const newKept=[false,false,false];

  // Rule: General & Straße must land in ONE throw — never build them across throws.
  // Only valid keep strategy: building Schock (1-1-X).

  // Step 1: keep any 1s in current dice (includes previously-kept 1s which stay in ps.dice)
  ps.dice.forEach((d,i)=>{if(d===1)newKept[i]=true;});

  // Count total 1s correctly: just count dice[i]===1 that are being kept.
  // Previously-kept 1s are already present in ps.dice at their index, so no double-counting.
  const totalOnes=ps.dice.filter((d,i)=>d===1&&newKept[i]).length;

  // Step 2: ONLY keep 1s — never keep the third die (the X in 1-1-X).
  // With throws remaining, always re-roll X to try for a higher value (ideally 6).
  // This also prevents keptCount=3 which would block doRoll from rolling anything.
  // (Max keptCount = 2, always leaving at least 1 die to roll)

  // Step 3: with only 1 one → keep just the 1, nothing else (aiming for second 1)

  // NO pair-keeping (no General building), NO consecutive-keeping (no Straße building)
  ps.kept=newKept;
  ps.keptDice=ps.dice.filter((_,i)=>newKept[i]);
  ps.keptCount=ps.keptDice.length;
}

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════
function render(){
  if(!G)return;
  // Safety net: detect any missed game-over (any phase where someone has all 13 lids)
  if(G.phase==='rolling'||G.phase==='summary'){
    const loser13=G.players.findIndex(p=>p.lids>=TOTAL_LIDS);
    if(loser13>=0){
      G.phase='gameover';G.gameLoser=loser13;
      if(G.half===2&&G.halfLosers[0]===loser13) G.halfLosers[1]=loser13; // mark H2 loser
      showGameOver();return;
    }
  }
  document.getElementById('round-chip').textContent=`Runde ${G.round||1}`;

  // Phase badge
  const pb=document.getElementById('phase-badge');
  pb.textContent=G.half===1?'1. Hälfte':G.half===2?'2. Hälfte':'Finale';
  pb.className='phase-badge'+(G.half==='finale'?' finale':'');

  // Mitte
  document.getElementById('mitte-num').textContent=G.middleLids;
  const dots=document.getElementById('mitte-dots');dots.innerHTML='';
  for(let i=0;i<TOTAL_LIDS;i++){
    const d=document.createElement('div');d.className='lid-dot'+(i<G.middleLids?' filled':'');dots.appendChild(d);
  }

  // Status
  const myTurn=G.phase==='rolling'&&G.currentTurn===ME;
  const sdot=document.getElementById('s-dot');
  sdot.style.display=myTurn?'block':'none';
  if(G.currentTurn!==undefined&&G.players&&!G.players[G.currentTurn])G.currentTurn=0;
  document.getElementById('status-msg').textContent=G.message||'';

  // Player grid
  const grid=document.getElementById('pgrid');
  grid.className=`pgrid np${NP}`;grid.innerHTML='';
  G.players.forEach((p,i)=>{
    const ps=G.playerStates[i];
    const isMe=i===ME;
    const isActive=G.phase==='rolling'&&G.currentTurn===i;
    const inFinale=G.half==='finale'&&G.finalists.length>0;
    const isFinalist=!inFinale||G.finalists.includes(i);

    const card=document.createElement('div');
    card.className='pcard'+(isActive?' active-turn':'')+(isMe?' is-me':'')+(G.markerHolder===i?' has-marker':'')+(inFinale&&!isFinalist?' inactive-finale':'');

    // Header
    const tags=[isMe?'<span class="tag me">(Du)</span>':'',G.markerHolder===i?'<span class="tag marker">🏷 Verlierer</span>':''].filter(Boolean).join('');
    let html=`<div class="pcard-header"><span class="pcard-name">${p.name}</span>${tags}</div>`;

    // Throw info
    if(G.phase==='laden'){
      html+=`<div class="pcard-throw">LADEN</div>`;
    } else if(ps&&ps.throwNum>0){
      html+=`<div class="pcard-throw">Wurf ${ps.throwNum}${G.firstPlayerDone?'/'+G.throwsAllowed:''}</div>`;
    } else {
      html+=`<div class="pcard-throw"></div>`;
    }

    // Dice display
    const diceDiv=document.createElement('div');diceDiv.className='pcard-dice';

    if(G.phase==='laden'){
      if(G.ladenDice[i]!==null) diceDiv.appendChild(makeDie(G.ladenDice[i],{size:'sm'}));
      else if(isActive) diceDiv.innerHTML='<span style="color:rgba(255,255,255,.2);font-size:12px">—</span>';
    } else if(ps){
      if(isMe){
        // Always show own dice
        ps.dice.forEach((d,j)=>{
          if(d!==null)diceDiv.appendChild(makeDie(d,{size:'sm',kept:ps.kept[j]}));
        });
      } else {
        // Vorzeitig gestoppt (throwNum < throwsAllowed) → offen zeigen
        // Letzter Wurf (throwNum >= throwsAllowed) → verdeckt bis Auswertung
        {
          const visKept=ps.keptVisible||[false,false,false];
          const stoppedEarly=ps.done&&!ps.concealed&&ps.throwNum<G.throwsAllowed;
          if(ps.throwNum>0||ps.done){
            ps.dice.forEach((d,j)=>{
              if(stoppedEarly)
                diceDiv.appendChild(makeDie(d,{size:'sm',kept:ps.kept[j]}));
              else if(visKept[j])
                diceDiv.appendChild(makeDie(d,{size:'sm',kept:true}));
              else
                diceDiv.appendChild(makeDie(null,{size:'sm',facedown:true}));
            });
          }
        }
      }
    }

    card.innerHTML=html;
    card.appendChild(diceDiv);

    // Combo
    let comboHtml='<div class="pcard-combo"></div>';
    // Only show combo for others in summary modal, not in player cards
    // (dice are concealed until summary)
    card.innerHTML+=comboHtml;

    // Lids
    const lidsHtml=`<div class="pcard-lids">${p.lids}<div class="lid-pips">${Array.from({length:p.lids},(_,k)=>`<div class="lid-pip${p.lids>=TOTAL_LIDS?' red':''}"></div>`).join('')}</div></div>`;
    card.innerHTML+=lidsHtml;

    grid.appendChild(card);
  });

  renderCup();
}

function renderCup(){
  if(!G)return;
  // In Finale, human only participates if they're a finalist
  const inFinaleNotFinalist=G.half==='finale'&&G.finalists&&G.finalists.length>0&&!G.finalists.includes(ME);
  const isMyTurn=(G.phase==='rolling'||G.phase==='laden')&&G.currentTurn===ME&&!inFinaleNotFinalist;
  const ps=G.playerStates?G.playerStates[ME]:null;
  const diceRow=document.getElementById('my-dice');
  const hint=document.getElementById('dice-hint');
  const comboEl=document.getElementById('my-combo');
  const throwsEl=document.getElementById('throws-left');
  const actions=document.getElementById('action-row');
  diceRow.innerHTML='';hint.textContent='';comboEl.textContent='';comboEl.className='combo-lbl';throwsEl.textContent='';actions.innerHTML='';

  if(G.phase==='laden'){
    if(G.ladenDice[ME]!=null){  // != catches both null and undefined (Firebase drops nulls)
      diceRow.appendChild(makeDie(G.ladenDice[ME],{size:'lg',anim:true}));
    }
    throwsEl.textContent='LADEN: NUR 1 WURF!';
    if(isMyTurn&&G.ladenDice[ME]==null){  // == catches both null and undefined
      const b=document.createElement('button');b.className='btn-roll';b.textContent='WÜRFELN';
      b.onclick=()=>doLaden(ME);actions.appendChild(b);
    }
    return;
  }

  if(G.phase!=='rolling'||!ps){return;}

  if(ps.done){
    if(ps.concealed){
      hint.textContent='Fertig — warte auf andere Spieler…';
    } else {
      ps.dice.forEach((d,i)=>{if(d!==null)diceRow.appendChild(makeDie(d,{size:'lg',kept:ps.kept[i]}));});
      hint.textContent='Fertig — warte auf andere Spieler…';
    }
    return;
  }

  if(!isMyTurn){
    const curName=G.players[G.currentTurn]?G.players[G.currentTurn].name:'?';
    hint.textContent=`${curName} ist am Zug…`;
    return;
  }

  const throwsLeft=G.throwsAllowed-(ps.throwNum||0);
  const hasRolled=ps.throwNum>0;

  // Dice (clickable)
  if(hasRolled){
    ps.dice.forEach((d,i)=>{
      if(d===null)return;
      const die=makeDie(d,{size:'lg',kept:ps.kept[i],clickable:true,anim:true});
      die.title=ps.kept[i]?'Behalten (klick zum Freigeben)':'Behalten (klick)';
      die.addEventListener('click',()=>doKeepToggle(ME,i));
      diceRow.appendChild(die);
    });
    // Hint
    const keptCount=ps.kept.filter(Boolean).length;
    if(throwsLeft>0&&keptCount<3) hint.textContent='Klick auf Würfel zum Behalten';
    // Combo
    if(ps.combo){
      comboEl.className='combo-lbl '+ps.combo.type;
      comboEl.textContent=ps.combo.label+(ps.combo.type==='general'?` ${diceLabel(ps.dice,ps.combo)}`:
        ps.combo.type==='strasse'?` ${diceLabel(ps.dice,ps.combo)}`:'');
    }
  } else {
    hint.textContent='Klick auf den Becher oder WÜRFELN!';
  }

  // Throws counter
  const limit=G.firstPlayerDone?G.throwsAllowed:3;
  if(hasRolled){
    throwsEl.textContent=`${throwsLeft} Wurf${throwsLeft!==1?'e':''} übrig`;
  } else {
    const firstPlayer=G.players[G.firstInRound];
    const limitNote=G.firstPlayerDone&&G.throwsAllowed<3?` (${firstPlayer.name} hat vorgespielt)`:'';
    throwsEl.textContent=`${limit} Würfe verfügbar${limitNote}`;
  }

  // Action buttons
  // Roll button
  if(!hasRolled||throwsLeft>0){
    const b=document.createElement('button');b.className='btn-roll';b.textContent='WÜRFELN';
    b.disabled=ps.keptCount===3;
    b.onclick=()=>doRoll(ME);
    actions.appendChild(b);
  }
  // Drehen
  if(hasRolled&&canDrehen(ps)){
    const b=document.createElement('button');b.className='btn-sec btn-drehen';
    b.textContent='🎲 Sechsen drehen';b.title='2 Sechsen → eine Eins behalten';
    b.onclick=()=>doDrehen(ME);actions.appendChild(b);
  }
  // Fertig / Verdeckt (only after first roll)
  if(hasRolled&&throwsLeft>0&&!ps.mustRollAfterDrehen){
    // Only show Fertig when there are throws remaining and no mandatory re-roll after Drehen
    const bf=document.createElement('button');bf.className='btn-sec';
    bf.textContent='Fertig ✓';
    bf.onclick=()=>doFinish(ME,false);actions.appendChild(bf);
  } else if(hasRolled&&throwsLeft>0&&ps.mustRollAfterDrehen){
    const info=document.createElement('div');
    info.style.cssText='font-size:11px;color:rgba(231,120,60,.8);font-family:Cinzel,serif;letter-spacing:1px;padding-top:4px';
    info.textContent='Nach dem Drehen muss nochmal gewürfelt werden!';
    actions.appendChild(info);
  }
}

// Cup click
document.getElementById('cup-icon').addEventListener('click',()=>{
  if(!G)return;
  if(G.phase==='laden'&&G.currentTurn===ME&&G.ladenDice[ME]===null){doLaden(ME);return;}
  if(G.phase==='rolling'&&G.currentTurn===ME){
    const ps=G.playerStates[ME];
    if(!ps.done&&(ps.throwNum===0||(G.throwsAllowed-ps.throwNum)>0))doRoll(ME);
  }
});
