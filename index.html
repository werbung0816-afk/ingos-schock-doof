<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#173fb0">
<title>Ingo's Schock Doof</title>
<link rel="manifest" href="./manifest.json">
<link rel="icon" type="image/png" sizes="32x32" href="./favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="./favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Schock Doof">
<meta name="mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ============================================================
   INGO'S SCHOCK DOOF — v2.0
   CI: Schnuppes-Spielportal / Moni's Zehntausend
   Cyan #53f6ff · Pink #ff4fd8 · Lila #8f5fff · Outfit · Glas
   Regeln: 3 Würfel, authentisch. Multiplayer = MP_STUB (selbst einbauen)
   ============================================================ */
:root{
  /* Eintracht-Braunschweig-CI: Blau & Gelb */
  --cyan:#ffd400; --pink:#ffd400; --purple:#173fb0;
  --pink-soft:#ffe26b; --gold:#ffd400;
  --blue:#173fb0; --blue-2:#2e6bff; --blue-deep:#0a1f5c;
  --panel:rgba(8,18,52,.82); --panel-2:rgba(255,255,255,.05);
  --line:rgba(255,255,255,.12); --danger:#e2231a; --ok:#39d98a; --red:#e2231a;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:'Outfit',system-ui,sans-serif;color:#fff;min-height:100dvh;
  background:
    repeating-radial-gradient(circle at 50% 50%,transparent 0px,transparent 68px,rgba(0,0,0,.20) 68px,rgba(0,0,0,.20) 71px,rgba(255,255,255,.05) 71px,rgba(255,255,255,.05) 73px,transparent 73px,transparent 138px),
    radial-gradient(ellipse 130% 110% at 50% 38%,#2178d8 0%,#0e52a0 40%,#062d6a 75%,#041428 100%);
  padding:max(6px,env(safe-area-inset-top)) 12px calc(10px + env(safe-area-inset-bottom));
  overflow-x:hidden;
}
.wrap{max-width:900px;margin:0 auto}
.screen{display:none;animation:fade .35s ease}
.screen.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.grad{background:linear-gradient(90deg,#fff,var(--gold));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent}

/* ---------- Header / Logo ---------- */
.brand{display:flex;align-items:center;gap:14px;justify-content:center;margin:4px 0 12px;text-align:center}
.brand .ph{width:clamp(54px,15vw,76px);height:clamp(54px,15vw,76px);border-radius:50%;object-fit:cover;object-position:50% 16%;
  border:3px solid var(--gold);box-shadow:0 0 22px rgba(255,207,92,.45),0 6px 16px rgba(0,0,0,.5);background:#1c1238}
.brand .tt{line-height:.92;text-align:left}
.brand .tt .sup{font-size:clamp(.6rem,2.6vw,.8rem);letter-spacing:.34em;color:var(--pink-soft);font-weight:600}
.brand .tt h1{font-size:clamp(1.7rem,8vw,3.1rem);font-weight:900;letter-spacing:.01em}
.brand .tt .ver{font-size:.62rem;letter-spacing:.18em;color:rgba(255,255,255,.5);font-weight:600;margin-top:2px;cursor:pointer}

/* ---------- Panels ---------- */
.panel{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:14px;backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);margin-bottom:14px}
.panel h2{text-align:center;font-size:.78rem;letter-spacing:.18em;text-transform:uppercase;color:var(--pink-soft);font-weight:700;margin-bottom:14px}
.sub{color:rgba(255,255,255,.6);font-size:.85rem}

/* ---------- Buttons ---------- */
button{font-family:inherit;cursor:pointer;border:none;color:#fff;background:transparent}
.btn{display:flex;align-items:center;justify-content:center;gap:.55rem;width:100%;padding:14px;border-radius:15px;font-weight:800;font-size:1rem;letter-spacing:.02em;
  background:linear-gradient(90deg,var(--blue),var(--blue-2));box-shadow:0 8px 22px rgba(23,63,176,.4);transition:transform .12s,filter .12s;position:relative;overflow:hidden;color:#fff}
.btn:active{transform:translateY(1px) scale(.99)}
.btn.cyan{background:linear-gradient(90deg,#ffe26b,var(--gold));box-shadow:0 8px 22px rgba(255,212,0,.32);color:#1a1500}
.btn.ghost{background:var(--panel-2);border:1px solid var(--line);box-shadow:none;color:#fff}
.btn.gold{background:linear-gradient(90deg,#ffe26b,var(--gold));color:#1a1500;box-shadow:0 8px 22px rgba(255,212,0,.32)}
.btn.danger{background:linear-gradient(90deg,#ff6f8a,#e23b5d);box-shadow:0 8px 22px rgba(231,59,93,.32);color:#fff}
.btn:disabled{opacity:.4;filter:grayscale(.4);pointer-events:none}
.btn.sm{width:auto;padding:10px 16px;font-size:.86rem;border-radius:13px}
.row{display:flex;gap:10px}.row>*{flex:1}

/* ---------- Lobby count selector ---------- */
.counts{display:flex;gap:12px;margin-bottom:6px}
.counts .opt{flex:1;text-align:center;padding:18px 6px;border-radius:18px;border:1px solid var(--line);background:var(--panel-2);transition:.15s;cursor:pointer}
.counts .opt.on{border-color:var(--cyan);background:rgba(83,246,255,.12);box-shadow:0 0 0 1px var(--cyan) inset,0 0 22px rgba(83,246,255,.18)}
.counts .opt .n{font-size:2rem;font-weight:900}
.counts .opt .l{font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.55)}
.field{width:100%;background:rgba(0,0,0,.28);border:1px solid var(--line);border-radius:14px;color:#fff;font:600 1.05rem 'Outfit';padding:14px 16px;margin-bottom:14px;text-align:center}
.field:focus{outline:none;border-color:var(--cyan)}

/* ---------- Game header ---------- */
.ghead{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:6px}
.icon-btn{width:40px;height:40px;flex:0 0 auto;border-radius:12px;background:var(--panel-2);border:1px solid var(--line);display:grid;place-items:center;font-size:1.05rem}
.ghead .mid{flex:1;text-align:center;display:flex;flex-direction:column;align-items:center;gap:2px}

/* ---------- Kaiser pill ---------- */
.kpill{display:none;align-items:center;justify-content:center;gap:.4rem;margin-bottom:6px;padding:8px;border-radius:14px;font-weight:800;color:#231a05;
  background:linear-gradient(90deg,#ffe08a,var(--gold),#ffe08a);background-size:200% 100%;box-shadow:0 0 0 1px rgba(255,207,92,.5),0 8px 24px rgba(255,207,92,.35);
  animation:kp 1.5s ease-in-out infinite,ksh 3s linear infinite}
.kpill.on{display:none}
@keyframes kp{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
@keyframes ksh{to{background-position:200% 0}}

/* ---------- Phase banner ---------- */
.phase{text-align:center;margin-bottom:4px}
.phase .ph{font-weight:900;font-size:clamp(.9rem,4vw,1.2rem)}
.chips{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:6px}
.chip{font-size:.72rem;font-weight:700;letter-spacing:.08em;border-radius:999px;padding:6px 13px;border:1px solid var(--line);background:var(--panel-2);user-select:none}
.chip.r{border-color:rgba(83,246,255,.35);color:var(--cyan);cursor:pointer}
.chip.m{border-color:rgba(255,207,92,.35);color:var(--gold)}

/* ---------- Players ---------- */
.players{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:8px}
.pc{flex:1 1 150px;max-width:220px;min-width:138px;height:100px;overflow:hidden;box-sizing:border-box;background:var(--panel-2);border:1px solid var(--line);border-radius:14px;padding:8px 11px;position:relative;transition:.2s}
.pc.active{border-color:var(--cyan);box-shadow:0 0 0 1px var(--cyan),0 0 20px rgba(255,212,0,.22)}
.pc.lost{border-color:rgba(226,35,26,.65);box-shadow:0 0 0 1px rgba(226,35,26,.4)}
.pc .nm{display:flex;align-items:center;gap:.35rem;font-weight:700;font-size:.95rem}
.pc .nm .ai{font-size:.55rem;color:var(--pink-soft);border:1px solid var(--line);border-radius:5px;padding:1px 5px;letter-spacing:.06em}
.pc .turnflag{font-size:.6rem;color:var(--gold);font-weight:700;letter-spacing:.05em;min-height:.85em;margin-top:1px}
.pc .cnt{position:absolute;top:10px;right:12px;font-weight:900;font-size:1.15rem;color:var(--gold)}
.lids{display:flex;flex-wrap:wrap;gap:2px;margin-top:3px}
.lid{width:11px;height:11px;border-radius:50%;border:1.5px solid rgba(255,212,0,.4)}
.lid.f{background:radial-gradient(circle at 35% 30%,#fff0a8,#c8951f);border-color:#c8951f;box-shadow:0 1px 2px rgba(0,0,0,.5)}
.pc .res{margin-top:2px;min-height:1em;font-weight:800;font-size:.7rem;color:var(--gold)}
.pc .mini{display:flex;gap:3px;margin-top:2px}
.pc .md{width:15px;height:15px;border-radius:4px;background:#f4ecff;color:#221038;font-size:10px;font-weight:800;display:grid;place-items:center}
.pc .md.cov{background:linear-gradient(160deg,#9a6a3c,#5e3c20);box-shadow:inset 0 -2px 3px rgba(0,0,0,.3),inset 0 1px 1px rgba(255,235,200,.25)}
.pc .hidden-tag{color:var(--pink-soft);font-size:.7rem;font-weight:700;margin-top:6px}

/* ---------- Arena: Becher + Würfel ---------- */
.arena{background:rgba(8,18,52,.55);border:1px solid var(--line);border-radius:14px;padding:14px 10px 6px;margin-bottom:6px;text-align:center;height:300px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;box-sizing:border-box;overflow:hidden;position:relative}
.arena .thr{font-size:.9rem;font-weight:900;color:#fff;margin-bottom:2px}
.cup{width:118px;height:104px;margin:4px auto 2px;position:relative}
.cup img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 7px 10px rgba(0,0,0,.5))}
.cup.shake{animation:shake .5s ease}
@keyframes shake{0%,100%{transform:rotate(0)}20%{transform:rotate(-9deg) translateY(-4px)}40%{transform:rotate(8deg)}60%{transform:rotate(-6deg)}80%{transform:rotate(4deg)}}
.cup-name{position:absolute;left:10%;right:10%;top:47%;text-align:center;font-weight:800;font-size:.7rem;line-height:1.08;letter-spacing:.04em;
  color:rgba(74,42,16,.82);text-shadow:0 1px 0 rgba(255,235,200,.3),0 0 1px rgba(40,18,2,.6);transform:translateY(-50%) rotate(-1.5deg);pointer-events:none;
  white-space:normal;word-break:break-word;overflow:hidden}
.dice{display:flex;justify-content:center;gap:10px;margin:6px 0 4px}
.die{width:clamp(46px,13vw,56px);height:clamp(46px,13vw,56px);border-radius:13px;background:linear-gradient(155deg,#fdfbff,#e3d8f5);position:relative;cursor:pointer;
  box-shadow:0 6px 14px rgba(0,0,0,.45),inset 0 -3px 6px rgba(120,90,160,.18),inset 0 2px 3px rgba(255,255,255,.8);transition:transform .15s,box-shadow .15s}
.die.kept{transform:translateY(-8px);box-shadow:0 12px 20px rgba(83,246,255,.4),0 0 0 3px var(--cyan)}
.die.roll{animation:tmb .45s ease}
@keyframes tmb{0%{transform:rotate(0) scale(1)}30%{transform:rotate(-20deg) scale(.9)}60%{transform:rotate(16deg) scale(1.06)}100%{transform:rotate(0) scale(1)}}
.die .pips{position:absolute;inset:0;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);padding:20%}
.die .pip{width:9px;height:9px;border-radius:50%;background:#2a1846;align-self:center;justify-self:center;box-shadow:inset 0 1px 1px rgba(0,0,0,.4)}
.die.one .pip{background:#e2231a}
.die.back{cursor:default;background:linear-gradient(160deg,#9a6a3c,#5e3c20);box-shadow:0 6px 14px rgba(0,0,0,.45),inset 0 -3px 6px rgba(0,0,0,.28),inset 0 2px 3px rgba(255,235,200,.25)}
.die.back:after{content:'';position:absolute;inset:0;border-radius:14px;background:repeating-linear-gradient(45deg,rgba(255,240,210,.07) 0 6px,transparent 6px 12px)}
.combo-big{min-height:1.3em;font-weight:900;font-size:clamp(1rem,5vw,1.5rem);margin-top:2px;opacity:0;transform:scale(.85)}
.combo-big.pop{animation:pop .5s cubic-bezier(.2,1.4,.4,1) forwards}
@keyframes pop{to{opacity:1;transform:scale(1)}}
.hint{font-size:.62rem;color:rgba(255,255,255,.5);letter-spacing:.06em;margin-top:1px}

/* ---------- Biersammler ---------- */
.bier-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--line);font-size:.92rem}
.bier-row:last-child{border-bottom:none}
.bier-row .amt{font-weight:800;color:var(--gold)}
.bier-tot{text-align:right;font-weight:900;color:var(--gold);margin-top:10px}

/* ---------- Modal ---------- */
.modal-bg{position:fixed;inset:0;z-index:200;background:rgba(5,1,17,.8);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;padding:18px}
.modal-bg.open{display:flex;animation:fade .25s}
.modal{width:100%;max-width:460px;max-height:88dvh;overflow:auto;background:linear-gradient(180deg,#160a2e,#0c0720);border:1px solid var(--line);border-radius:22px;padding:24px 20px;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.modal h2{font-size:1.4rem;font-weight:900;text-align:center;margin-bottom:12px}
.modal h3{font-size:.84rem;letter-spacing:.1em;text-transform:uppercase;color:var(--pink-soft);margin:16px 0 6px}
.sum-row{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
.sum-row:last-child{border-bottom:none}
.sum-row.win{color:var(--ok)}.sum-row.lose{color:var(--danger)}
.sum-row .nm{font-weight:700}.sum-row .cb{font-size:.78rem;text-align:right;color:rgba(255,255,255,.7)}
.mini-d{display:inline-flex;gap:3px;vertical-align:middle}
.mini-d span{width:17px;height:17px;border-radius:4px;background:#f4ecff;color:#221038;font-size:10px;font-weight:800;display:inline-grid;place-items:center}

/* ---------- Overlay (Sieg/Niederlage) ---------- */
#overlay{position:fixed;inset:0;z-index:300;display:none;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;
  background:repeating-radial-gradient(circle at 50% 50%,transparent 0px,transparent 68px,rgba(0,0,0,.20) 68px,rgba(0,0,0,.20) 71px,rgba(255,255,255,.05) 71px,rgba(255,255,255,.05) 73px,transparent 73px,transparent 138px),radial-gradient(ellipse 130% 110% at 50% 38%,#2178d8 0%,#0e52a0 40%,#062d6a 75%,#041428 100%)}
#overlay.on{display:flex;animation:fade .4s}
#overlay .cmt{font-size:clamp(1.6rem,8vw,3rem);font-weight:900;margin-bottom:18px;line-height:1.1}
#overlay .who{font-size:clamp(1.1rem,5vw,1.6rem);font-weight:800;letter-spacing:.04em}
#overlay .lbl{font-size:.8rem;letter-spacing:.32em;opacity:.7;margin-bottom:8px;text-transform:uppercase}

/* ---------- Toast ---------- */
#toasts{position:fixed;left:0;right:0;bottom:max(18px,env(safe-area-inset-bottom));z-index:400;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none;padding:0 14px}
.toast{background:rgba(16,8,36,.96);border:1px solid var(--line);border-radius:13px;padding:11px 16px;font-size:.88rem;max-width:420px;box-shadow:0 12px 30px rgba(0,0,0,.5);animation:tin .3s}
.toast.ok{border-color:rgba(66,245,163,.4)}.toast.warn{border-color:rgba(255,94,122,.45)}
@keyframes tin{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

/* ---------- Confetti ---------- */
#conf{position:fixed;inset:0;z-index:350;pointer-events:none;overflow:hidden}
.cf{position:absolute;top:-12px;width:9px;height:14px;border-radius:2px;animation:cfall linear forwards}
@keyframes cfall{to{transform:translateY(108vh) rotate(720deg);opacity:.9}}

.divider{height:1px;background:linear-gradient(90deg,transparent,var(--line),transparent);margin:8px 0}
.help{display:block;color:rgba(255,255,255,.5);font-size:.72rem;margin-top:6px;line-height:1.5;text-align:center}
.foot{text-align:center;color:rgba(255,255,255,.4);font-size:.66rem;letter-spacing:.1em;margin-top:8px}

/* Cursor im Spiel unauffällig (kein Hand-/Text-Cursor), Auswahl aus */
body{-webkit-user-select:none;user-select:none}
.field{-webkit-user-select:text;user-select:text}
#game,#game *{cursor:default}

/* Mitte-Anzeige (groß) */
.middle-box{display:inline-flex;align-items:center;gap:.4rem;padding:4px 12px;border-radius:12px;border:1px solid rgba(255,212,0,.35);background:rgba(255,212,0,.08)}
.middle-box .lbl{font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);font-weight:700}
.middle-box .num{font-size:1.2rem;font-weight:900;color:var(--gold);line-height:1}

/* Kaiserrunde als dezentes Kontrollkästchen, pulsiert bei Aktivität */
.kaiser-wrap{text-align:center;margin:0 0 10px}

/* Wartebereich */
.seat{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:13px;border:1px solid var(--line);background:var(--panel-2);margin-bottom:8px}
.seat.filled{border-color:rgba(255,212,0,.4)}
.seat .snum{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;font-weight:800;background:rgba(255,212,0,.15);color:var(--gold);flex:0 0 auto;font-size:.85rem}
.seat .snm{font-weight:700;flex:1}
.seat .snm.wait{color:rgba(255,255,255,.5);font-weight:600}
.seat .badge{font-size:.56rem;background:var(--gold);color:#1a1500;border-radius:5px;padding:1px 5px;font-weight:800;letter-spacing:.04em;vertical-align:middle}
.seat .sok{color:var(--ok);font-weight:800}
.seat .shint{font-size:.6rem;color:rgba(255,255,255,.4)}
.dots i{font-style:normal;animation:blink 1.2s infinite}.dots i:nth-child(2){animation-delay:.2s}.dots i:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,100%{opacity:.2}50%{opacity:1}}

/* ---------- Responsive ---------- */
@media(min-width:701px){
  .players{flex-wrap:nowrap}
}
@media(max-width:450px){
  .pc{flex:1 1 100%;max-width:none}
  .counts .opt{padding:14px 4px}
  .panel{padding:16px;border-radius:18px}
}

.waitturn{text-align:center;padding:14px;border-radius:14px;border:1px dashed var(--line);color:rgba(255,255,255,.7);font-weight:600}
#overlay{overflow:auto}
#overlay .ovx{font-size:.9rem;color:rgba(255,255,255,.8);margin-top:8px;max-width:420px;line-height:1.5}
#overlay .ovbier{width:100%;max-width:360px;margin-top:14px;text-align:left}
#overlay .bier-pic{display:flex;flex-direction:column;align-items:center;gap:8px;margin-top:14px}
#overlay .bier-pic-img{width:clamp(96px,28vw,140px);height:auto;filter:drop-shadow(0 8px 16px rgba(0,0,0,.5))}
#overlay .bier-quote{font-size:.92rem;font-weight:700;color:rgba(255,255,255,.88);text-align:center;max-width:300px;line-height:1.4}

#intro{position:fixed;inset:0;z-index:1000;background:repeating-radial-gradient(circle at 50% 50%,transparent 0px,transparent 70px,rgba(0,0,0,.22) 70px,rgba(0,0,0,.22) 73px,rgba(255,255,255,.06) 73px,rgba(255,255,255,.06) 75px,transparent 75px,transparent 145px),radial-gradient(ellipse 130% 110% at 50% 38%,#2178d8 0%,#0e52a0 40%,#062d6a 75%,#041428 100%);animation:intro-fade .55s ease both}
@keyframes intro-fade{from{opacity:0}to{opacity:1}}
.intro-logo{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:clamp(90px,20vw,120px);height:clamp(90px,20vw,120px);border-radius:50%;object-fit:cover;object-position:50% 16%;border:4px solid #ffd400;box-shadow:0 0 40px #ffd400aa;opacity:0;animation:intro-logo-in .5s cubic-bezier(.3,1.4,.4,1) .1s both}
@keyframes intro-logo-in{from{opacity:0;transform:translate(-50%,-50%) scale(.55)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
.intro-textwrap{position:absolute;left:50%;top:calc(50% + clamp(45px,10vw,60px) + 10px);transform:translateX(-50%);display:flex;flex-direction:column;align-items:flex-start;opacity:0;animation:intro-text-in .45s ease-out .32s both}
@keyframes intro-text-in{from{opacity:0;transform:translateX(-50%) translateY(16px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.intro-sup{font-size:clamp(.95rem,3.4vw,1.3rem);letter-spacing:.32em;font-weight:900;color:#173fb0;background:#ffd400;padding:3px 10px;border-radius:5px;margin-bottom:4px}
.intro-title{white-space:nowrap;font-size:clamp(2rem,10vw,3.8rem);font-weight:900;line-height:1}
.intro-title span.grad{background:linear-gradient(90deg,#fff 30%,#ffd400);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.word-doof{position:relative;display:inline-block}
.props-img{position:absolute;left:50%;bottom:100%;transform:translate(-50%,14px);height:clamp(58px,15vw,83px);width:auto;object-fit:contain;filter:drop-shadow(0 4px 8px rgba(0,0,0,.5));margin-bottom:clamp(0px,.5vw,4px);opacity:0;animation:props-drop-in .5s cubic-bezier(.25,.9,.3,1.35) .58s both}
@keyframes props-drop-in{0%{opacity:0;transform:translate(-50%,-26px) rotate(-14deg)}70%{opacity:1;transform:translate(-50%,18px) rotate(4deg)}100%{opacity:1;transform:translate(-50%,14px) rotate(0deg)}}
.brand2{display:flex;align-items:center;gap:14px;justify-content:center;margin:4px 0 12px;text-align:center}
.brand2-photo{width:clamp(54px,15vw,76px);height:clamp(54px,15vw,76px);border-radius:50%;object-fit:cover;object-position:50% 16%;border:4px solid #ffd400;box-shadow:0 0 24px #ffd400aa;flex:none;animation:ingo-glow-pulse 3.4s ease-in-out infinite}
@keyframes ingo-glow-pulse{0%,100%{box-shadow:0 0 18px #ffd40088}50%{box-shadow:0 0 36px #ffd400dd}}
.brand2-text{line-height:.92;text-align:left;display:flex;flex-direction:column;align-items:flex-start}
.brand2-sup{font-size:clamp(.55rem,2.2vw,.72rem);letter-spacing:.28em;font-weight:900;color:#173fb0;background:#ffd400;padding:2px 8px;border-radius:5px;margin-bottom:3px}
.brand2-title{white-space:nowrap;font-size:clamp(1.7rem,8vw,3.1rem);font-weight:900;line-height:1}
.brand2-title .grad{background:linear-gradient(90deg,#fff 30%,#ffd400);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.brand2-word-doof{position:relative;display:inline-block}
.brand2-props{position:absolute;left:50%;bottom:100%;transform:translate(-50%,11px);height:clamp(34px,9.5vw,46px);width:auto;object-fit:contain;filter:drop-shadow(0 3px 6px rgba(0,0,0,.5));margin-bottom:0}

.kaiser-flash{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.85);z-index:500;background:rgba(226,35,26,.94);color:#fff;font-weight:900;font-size:clamp(.9rem,4vw,1.15rem);border-radius:18px;padding:16px 22px;text-align:center;max-width:82vw;pointer-events:none;opacity:0;transition:opacity .35s,transform .35s}
.kaiser-flash.on{opacity:1;transform:translate(-50%,-50%) scale(1)}
@keyframes kp{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}

#bierModal{display:none;position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);align-items:flex-end;justify-content:center;padding:0}
#bierModal.on{display:flex}
.bier-sheet{background:linear-gradient(170deg,#0e2060,#07000f);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:80vh;overflow-y:auto;padding:20px 18px 32px;border-top:1px solid rgba(255,255,255,.15)}
.bier-sheet h2{text-align:center;font-size:1rem;letter-spacing:.2em;text-transform:uppercase;color:var(--pink-soft);margin-bottom:14px}
.bier-close{float:right;background:none;border:none;color:rgba(255,255,255,.5);font-size:1.4rem;cursor:pointer;margin-top:-4px}
#lobby.on{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:24px 16px;box-sizing:border-box}
#lobby.on>*{width:100%;max-width:400px;box-sizing:border-box}

.kaiser-toggle{display:inline-flex;align-items:center;gap:.3rem;padding:4px 8px;border-radius:9px;font-size:.73rem;font-weight:600;color:rgba(255,255,255,.65);border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.07)}
.kaiser-toggle.on{color:var(--gold)!important;border-color:rgba(255,212,0,.6)!important;animation:kp 1.4s ease-in-out infinite}

#overlay .ov-win{font-size:clamp(1.8rem,9vw,3.2rem);font-weight:900;letter-spacing:.02em;line-height:1;margin-bottom:12px;text-shadow:0 0 40px currentColor}
#overlay .ov-div{width:60px;height:2px;background:rgba(255,255,255,.2);border-radius:2px;margin:14px auto}
#devBtn{position:fixed;bottom:72px;right:12px;z-index:600;background:rgba(255,100,0,.7);border:2px solid rgba(255,150,0,.8);color:#fff;font-size:1rem;width:38px;height:38px;border-radius:50%;cursor:pointer;display:none;align-items:center;justify-content:center}
#devBtn.on{display:flex}
#devMenu{position:fixed;bottom:116px;right:12px;z-index:600;background:rgba(10,5,30,.95);border:1px solid rgba(255,255,255,.2);border-radius:14px;padding:10px;display:none;flex-direction:column;gap:6px;min-width:190px}
#devMenu.on{display:flex}
#devMenu button{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#fff;padding:7px 12px;border-radius:9px;font-size:.82rem;cursor:pointer;text-align:left}
</style>

<script>
'use strict';
/* ============================================================
   INGO'S SCHOCK DOOF — v2.2  ·  Firebase-Multiplayer (Host-autoritativ)
   Ein fester Raum. Erster Spieler = Host (Spiel-Engine). Gäste sehen den
   Zustand und senden auf ihrem Zug Signale; der Host wendet sie an.
   ============================================================ */
const VERSION='v5.60';
const P_COLORS=['#ffd400','#53f6ff','#e2231a','#39d98a'];
function playerColor(i){ return P_COLORS[i%P_COLORS.length]; }
const TOTAL_LIDS=13;
const THROWS=3;
const $=id=>document.getElementById(id);
function _escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fitCupName(el,name){
  if(!el)return;
  name=(name||'').trim();
  el.style.fontSize='';
  if(!name){ el.textContent=''; return; }
  const words=name.split(/\s+/).filter(Boolean);
  const html=words.length>1?(_escHtml(words[0])+'<br>'+_escHtml(words.slice(1).join(' '))):_escHtml(words[0]);
  el.innerHTML=html;
  const maxFont=.7, minFont=.36, step=.02;
  const maxH=el.parentElement?el.parentElement.clientHeight*.5:50;
  let size=maxFont;
  el.style.fontSize=size+'rem';

// Spielt eine Liste von Audio-Objekten sequentiell ab (jeweils nach Ende des vorherigen)
function playChain(list){
  let i=0;
  function next(){
    if(i>=list.length) return;
    const a=list[i++];
    if(!a){ next(); return; }
    try{ a.currentTime=0; a.onended=next; a.play().catch(()=>{ next(); }); }catch(e){ next(); }
  }
  next();
}

const PIP={1:[[2,2]],2:[[1,1],[3,3]],3:[[1,1],[2,2],[3,3]],4:[[1,1],[3,1],[1,3],[3,3]],5:[[1,1],[3,1],[2,2],[1,3],[3,3]],6:[[1,1],[3,1],[1,2],[3,2],[1,3],[3,3]]};

/* ---------- Regel-Engine (3 Würfel) ---------- */
function evalDice(dice, throwNum){
  const s=[...dice].sort((a,b)=>a-b); const [a,b,c]=s; const ones=dice.filter(d=>d===1).length;
  if(a===1&&b===1&&c===1) return {type:'schockaus',label:'Schock Aus',deckel:'all',rank:1e9};
  if(ones===2){ const n=s.find(x=>x!==1); return {type:'schock',n,label:(n===2?'Schock Doof':'Schock '+n),deckel:n,rank:n*1e6+5e4+n}; }
  if(a===b&&b===c) return {type:'general',label:'General '+a,deckel:3,rank:2e6+4e4+a};
  if(b===a+1&&c===b+1) return {type:'strasse',label:'Straße '+a+'-'+c,deckel:2,rank:2e6+3e4+a};
  const num=c*100+b*10+a; return {type:'zahl',label:'Zahl '+num,deckel:1,rank:1e6+num};
}
function sortKey(ps){ return ps.combo.rank*1000 - (ps.throwNum||1)*100 - (ps.order||0); }

/* ---------- State ---------- */
let G=null, SZ={settled:{},games:[]}, recoveryTimer=null, _rolling=false, roomEnteredAt=0, _gameOverConfirmed=false;
// Biersammler ist raumübergreifend dauerhaft — daher sofort beim Start laden,
// unabhängig davon ob/wann ein Raum betreten wird (sonst zeigt das Modal vor
// dem ersten enterRoom() fälschlich "Noch keine Einträge.")
if(ONLINE){ try{ ROOM.child('biersammler').on('value',s=>{ const v=s.val(); if(v) SZ={settled:v.settled||{},games:v.games||[]}; }); }catch(e){} }
const AI_POOL=['Micha','Holly','JP','Sebs','Gonzo','Hannes','Oli','Joschi'];
function freshG(players){
  return { phase:'laden', half:1, round:1,
    players:players.map(p=>({name:p.name,isAI:!!p.isAI,cid:p.cid||null,lids:0,left:false})),
    middleLids:TOTAL_LIDS, starter:0, turnOrder:[], turnPtr:0, playerStates:[], maxThrows:THROWS,
    marker:-1, halfLosers:[-1,-1], finalists:[], gameLoser:-1,
    kaiserrunde:false, kaiserrundeBy:null, kaiserGamesPlayed:0,
    banner:'', notice:null, over:null, _usedHalfQuote:null, ts:Date.now() };
}
function activePlayers(){
  let base;
  if(G.half==='finale'&&G.finalists&&G.finalists.length) base=G.finalists.filter(i=>i>=0&&!G.players[i].left);
  else base=G.players.map((_,i)=>i).filter(i=>!G.players[i].left);
  if(G.half!=='finale'&&G.middleLids<=0) base=base.filter(i=>G.players[i].lids>0);
  return base;
}
function participants(){ return activePlayers().filter(i=>!G.players[i].isAI); }
function cur(){ return G.turnOrder[G.turnPtr]; }
function maxFor(ps){ return (ps&&ps.order===0)?THROWS:(G.maxThrows||THROWS); }
function curMax(){ const ps=G&&G.playerStates&&G.playerStates[cur()]; return ps?maxFor(ps):THROWS; }
function maxFor(ps){ return (ps.order===0)?THROWS:G.maxThrows; }
function curMax(){ return maxFor(G.playerStates[cur()]); }
function myIdx(){ if(!G) return -1; const i=G.players.findIndex(p=>p.cid===CID); if(i>=0) return i; return (!ONLINE)?G.players.findIndex(p=>!p.isAI):-1; }
function isMe(idx){ return idx===myIdx(); }

/* ---------- Firebase: State-Sync ---------- */
function sanitize(o){ return JSON.parse(JSON.stringify(o,(k,v)=>v===undefined?null:v)); }
function hydrate(raw){
  const g=raw; g.players=g.players||[]; g.players.forEach(p=>{ if(typeof p.lids!=='number')p.lids=0; });
  g.turnOrder=g.turnOrder||[]; g.finalists=g.finalists||[]; g.halfLosers=g.halfLosers||[-1,-1];
  g.playerStates=g.playerStates||[];
  g.playerStates.forEach(ps=>{ ps.dice=ps.dice||[1,1,1]; ps.kept=ps.kept||[false,false,false];
    for(let i=0;i<3;i++){ ps.kept[i]=!!ps.kept[i]; if(typeof ps.dice[i]!=='number')ps.dice[i]=1; } });
  return g;
}
function pushState(){
  if(!ONLINE||!G) return;
  // notice, gameover, kaiserover immer pushen — kritische Übergänge
  if(!amHost && G.phase!=='gameover' && G.phase!=='kaiserover' && G.phase!=='notice') return;
  G.ts=Date.now(); try{ ROOM.child('state').set(sanitize(G)); }catch(e){ console.warn('pushState:',e); }
}

/* ---------- Firebase: Präsenz / Raum ---------- */
function enterRoom(){
  myName=($('nameInput').value||'Spieler').trim(); seatCount=lobbyCount; G=null; roomEnteredAt=Date.now();
  try{ if(myName&&myName!=='Spieler') localStorage.setItem('schock_name',myName); }catch(e){}
  showScreen('waiting');
  if(!ONLINE){ amHost=true; roomPlayersLocal=[myName]; renderWaiting(); return; }
  // alten Raum-State aus früheren Sessions aufräumen (nur einmalig beim Eintreten)
  ROOM.child('presence').once('value',snap=>{ const cut=Date.now()-10*60*1000; snap.forEach(ch=>{ const v=ch.val(); const isTest=ch.key.indexOf('test_')===0; if(v&&((v.ts&&v.ts<cut)||isTest)) ch.ref.remove(); }); });
  ROOM.child('state').once('value',snap=>{ const st=snap.val(); if(st&&st.phase&&!['rolling','laden','summary'].includes(st.phase)) ROOM.child('state').remove(); });
  const me=ROOM.child('presence/'+CID);
  me.set({name:myName, ts:firebase.database.ServerValue.TIMESTAMP});
  me.onDisconnect().remove();
  let wasHost=false;
  ROOM.child('config/seats').on('value',s=>{ if(s.val()){ seatCount=s.val(); renderWaiting(); } });
  ROOM.child('presence').on('value',s=>{
    presence=s.val()||{};
    const wasH=amHost; electHost();
    if(amHost&&!wasH){
      // neu zum Host geworden: Sitzplätze schreiben + Signale abhören
      ROOM.child('config/seats').set(seatCount); // erzwingt die in der Lobby gewählte Spieleranzahl
      if(!wasHost){ wasHost=true; }
      toast('Du bist jetzt Host.','ok');
    }
    renderWaiting();
  });
  // Biersammler ist bereits global beim App-Start abonniert (siehe oben), hier keine erneute Anmeldung nötig

  ROOM.child('state').on('value',s=>{
    if(amHost) return;
    const raw=s.val(); if(!raw){ G=null; return; }
    if(raw.ts&&raw.ts<roomEnteredAt-60000) return;
    if(raw.players&&!raw.players.some(p=>p&&p.cid===CID)) return;
    // Älteren State niemals annehmen (allgemeiner Guard)
    if(G&&G.ts&&raw.ts&&raw.ts<=G.ts) return;
    // Gameover darf nicht überschrieben werden
    if(_gameOverConfirmed&&raw.phase!=='gameover'&&raw.phase!=='kaiserover') return;
    G=hydrate(raw); if(curScreen!=='game') showScreen('game'); paint();
  });
  ROOM.child('signals').on('child_added',s=>{
    const sig=s.val();
    if(!sig) return;
    // Kaiser + newgame darf jeder Host jederzeit verarbeiten
    if(sig.type==='kaiser'||sig.type==='newgame'){ if(amHost){ s.ref.remove(); handleSignal(sig); } return; }
    if(!amHost) return;   // Spiel-Signale nur Host
    s.ref.remove(); handleSignal(sig);
  });
}
function electHost(){
  // Host = früheste Präsenz (kleinster ts). Test-Einträge zählen nicht.
  const list=presenceList().filter(x=>!x.cid.startsWith('test_'));
  amHost = list.length>0 && list[0].cid===CID;
}
function presenceList(){ return Object.keys(presence).map(k=>({cid:k,name:(presence[k]&&presence[k].name)||'Spieler',ts:(presence[k]&&presence[k].ts)||0})).sort((a,b)=>a.ts-b.ts); }
function renderWaiting(){
  const list = ONLINE? presenceList() : roomPlayersLocal.map((n,i)=>({cid:'L'+i,name:n}));
  const hostIdx = list.findIndex(x=>!(typeof x.cid==='string' && x.cid.indexOf('test_')===0));
  $('waitCount').textContent=seatCount;
  const box=$('seats'); box.innerHTML='';
  for(let i=0;i<seatCount;i++){
    const h=list[i]; const seat=document.createElement('div'); seat.className='seat'+(h?' filled':'');
    seat.innerHTML = h
      ? `<span class="snum">${i+1}</span><span class="snm">${h.name}${i===hostIdx?' <span class="badge">Host</span>':''}${h.cid===CID?' <span class="badge" style="background:var(--cyan)">Du</span>':''}</span><span class="sok">✓</span>`
      : `<span class="snum">${i+1}</span><span class="snm wait">wartet auf Spieler <span class="dots"><i>.</i><i>.</i><i>.</i></span></span><span class="shint">→ wird KI</span>`;
    box.appendChild(seat);
  }
  $('startMatchBtn').style.display=amHost?'':'none';
  $('addTestBtn').style.display=amHost?'':'none';
  const note=$('waitHostNote'); if(note) note.style.display=amHost?'none':'';
}
function addTestPlayer(){
  if(!ONLINE){ if(roomPlayersLocal.length>=seatCount){toast('Alle Plätze belegt.','warn');return;} const used=roomPlayersLocal.map(n=>n.toLowerCase()); const p=AI_POOL.filter(n=>!used.includes(n.toLowerCase())); roomPlayersLocal.push(p.length?pick(p):'Gast'+(roomPlayersLocal.length+1)); renderWaiting(); return; }
  const used=presenceList().map(x=>x.name.toLowerCase()); const p=AI_POOL.filter(n=>!used.includes(n.toLowerCase()));
  const nm=p.length?pick(p):('Gast'+Date.now()%100);
  const ref=ROOM.child('presence/test_'+Math.random().toString(36).slice(2,7));
  ref.set({name:nm,ts:Date.now()}); ref.onDisconnect().remove();
}
function leaveRoom(){
  if(ONLINE){ try{ ROOM.child('presence/'+CID).remove(); ROOM.off(); }catch(e){} }
  amHost=!ONLINE; presence={}; showScreen('lobby');
}

/* ---------- Spielstart (Host) ---------- */
function startMatch(){
  if(ONLINE && !amHost){ toast('Nur der Host startet.','warn'); return; }
  const list = ONLINE? presenceList() : roomPlayersLocal.map((n,i)=>({cid:'L'+i,name:n}));
  const players=list.slice(0,seatCount).map(h=>({name:h.name,isAI:(typeof h.cid==='string'&&h.cid.indexOf('test_')===0),cid:h.cid}));
  const humanNames=players.map(p=>p.name.toLowerCase());
  const aiNames=[]; if(!humanNames.includes('ingo')) aiNames.push('Ingo');
  const pool=AI_POOL.filter(n=>!humanNames.includes(n.toLowerCase())).sort(()=>Math.random()-.5);
  for(const n of pool){ if(players.length+aiNames.length>=seatCount)break; aiNames.push(n); }
  let ai=0; while(players.length<seatCount){ players.push({name:aiNames[ai++]||('KI '+(players.length+1)),isAI:true,cid:null}); }
  G=freshG(players); showScreen('game'); updateKaiser(); startRecovery(); runLaden();
}

/* ---------- Laden (Host) ---------- */
async function runLaden(){
  G.phase='laden'; G.banner=''; G.notice=null; G.over=null; $('phaseLabel').textContent='Laden';
  $('controls').innerHTML=''; $('comboBig').className='combo-big'; $('comboBig').textContent=''; renderPlayers(); pushState();
  let order, best, winners;
  do{ order=activePlayers().sort(()=>Math.random()-.5); const rolls=[];
    for(const idx of order){ fitCupName($('cupName'),G.players[idx].name); $('cup').classList.add('shake'); playDice();
      $('dice').innerHTML=`<div class="die roll">${pips(rollDie())}</div>`; await sleep(220); const v=rollDie(); rolls.push(v);
      $('dice').innerHTML=`<div class="die${v===1?' one':''}">${pips(v)}</div>`; $('cup').classList.remove('shake'); vibe(12); await sleep(320); }
    best=Math.max(...rolls); winners=order.filter((_,k)=>rolls[k]===best);
  } while(winners.length>1);
  const allP=participants(); G.starter=winners[0]||(allP[Math.floor(Math.random()*allP.length)]); toast(`${G.players[G.starter].name} beginnt!`,'ok');
  await sleep(400); beginRound();
}

/* ---------- Runde (Host) ---------- */
function buildOrder(){ const pool=activePlayers(); const start=pool.includes(G.starter)?G.starter:pool[0]; const si=pool.indexOf(start); const o=[]; for(let i=0;i<pool.length;i++)o.push(pool[(si+i)%pool.length]); return o; }
function beginRound(){
  G.phase='rolling'; G.banner=''; G.notice=null; G.over=null; G.turnOrder=buildOrder(); G.turnPtr=0; G.maxThrows=THROWS;
  G.roundAnnounce={starter:G.starter,ts:Date.now()};
  const _prev=(G.playerStates||[]).map(ps=>ps&&ps.done?ps.dice:null);
  G.playerStates=G.players.map((_,i)=>({dice:[1,1,1],kept:[false,false,false],throwNum:0,done:false,concealed:false,revealed:false,combo:null,order:0,mustRoll:false,prevDice:(_prev[i]||null)}));
  G.turnOrder.forEach((idx,k)=>{ G.playerStates[idx].order=k; });
  startTurn();
}
function startTurn(){
  const idx=cur(); paint(); pushState();
  if(G.players[idx].isAI){ aiTurn(); }
}

/* ---------- Eingaben (Client) ---------- */
function actRoll(){ if(amHost) hostRoll(); else sendSignal('roll'); }
function actKeep(i){ if(amHost) hostKeep(i); else sendSignal('keep',{i}); }
function actDrehen(){ if(amHost) hostDrehen(); else sendSignal('drehen'); }
function actFinish(c){ if(amHost) hostFinish(c); else sendSignal('finish',{concealed:c}); }
function sendSignal(type,extra){ if(!ONLINE)return; try{ ROOM.child('signals').push(Object.assign({type,by:CID,t:Date.now()},extra||{})); }catch(e){} }
function handleSignal(sig){
  if(!sig) return;
  if(sig.type==='kaiser'){ applyKaiser(sig.by); return; }
  if(sig.type==='newgame'){ if(amHost) newGameHost(); return; }
  if(!amHost||!G||G.phase!=='rolling') return;
  const idx=cur(); if(G.players[idx].cid!==sig.by) return;
  if(sig.type==='roll') hostRoll();
  else if(sig.type==='keep') hostKeep(sig.i);
  else if(sig.type==='drehen') hostDrehen();
  else if(sig.type==='finish') hostFinish(!!sig.concealed);
}

/* ---------- Host-Ausführung ---------- */
async function hostRoll(){ if(_rolling)return; _rolling=true; const idx=cur(); $('controls').innerHTML=''; await animRoll(idx);
  const ps=G.playerStates[idx]; ps.mustRoll=false; _rolling=false; pushState();
  if(ps.throwNum>=curMax()) hostFinish(false); else { renderTurnUI(); renderDice(); } }
function hostKeep(i){ const ps=G.playerStates[cur()]; if(ps.throwNum<1||(ps.throwNum>=curMax()&&!ps.mustRoll))return;
  if(ps.mustRoll&&ps.dice[i]===6){ toast('Diese 6 muss neu gewürfelt werden.',''); return; }
  ps.kept[i]=!ps.kept[i]; vibe(8); renderDice(); pushState(); }
function hostDrehen(){ const idx=cur(); doDrehen(idx); renderDice(); renderTurnUI(); pushState(); }
function hostFinish(concealed){ finishTurn(cur(),concealed); }

async function animRoll(idx){
  const ps=G.playerStates[idx]; const me=(idx===myIdx());
  const _cb=$('comboBig'); if(_cb&&!_vorlegerActive){_cb.innerHTML='';_cb.className='combo-big';}
  $('cup').classList.add('shake'); playDice(); vibe([10,30,10]);
  if(me){ $('dice').innerHTML=ps.dice.map((d,i)=>`<div class="die${ps.kept[i]?' kept':''}" data-i="${i}">${pips(d)}</div>`).join('');
    const els=[...$('dice').children]; els.forEach((el,i)=>{ if(!ps.kept[i]) el.classList.add('roll'); });
    for(let f=0;f<5;f++){ els.forEach((el)=>{ const i=Number(el.dataset.i); if(!ps.kept[i]) el.innerHTML=pips(rollDie()); }); await sleep(70); } }
  else { await sleep(420); }
  for(let i=0;i<3;i++){ if(!ps.kept[i]) ps.dice[i]=rollDie(); }
  ps.throwNum++; ps.mustRoll=false; $('cup').classList.remove('shake'); renderDice(); $('thr').textContent=`Wurf ${ps.throwNum} / ${curMax()}`;
}
function canDrehen(ps){ if(ps.throwNum<1||ps.throwNum>=maxFor(ps))return false; return ps.dice.filter(d=>d===6).length>=2; }
function doDrehen(idx){ const ps=G.playerStates[idx]; if(!canDrehen(ps))return; let conv=0;
  for(let i=0;i<3&&conv<2;i++){ if(ps.dice[i]===6){ if(conv===0){ps.dice[i]=1;ps.kept[i]=true;} else {ps.kept[i]=false;} conv++; } }
  ps.mustRoll=true; vibe(20); toast('Gedreht — eine 6 wird zur 1, nochmal würfeln.','ok'); }

function finishTurn(idx,concealed){
  const ps=G.playerStates[idx]; if(ps.throwNum===0){ toast('Erst würfeln!','warn'); return; }
  if(ps.mustRoll){ toast('Nach dem Drehen erst würfeln.','warn'); return; }
  ps.done=true; ps.combo=evalDice(ps.dice,ps.throwNum); if(ps.combo.type==='schockaus') concealed=false;
  ps.concealed=!!concealed; vibe(20); if(ps.order===0) G.maxThrows=ps.throwNum;
  if(!concealed&&isMe(idx)){ const cb=$('comboBig'); cb.textContent=ps.combo.label; cb.className='combo-big pop'+(ps.combo.type==='schockaus'?'':' grad'); cb.style.color=(ps.combo.type==='schockaus')?'var(--red)':''; }
  renderPlayers(); pushState();
  setTimeout(advance, G.players[idx].isAI?600:850);
}
function advance(){ G.turnPtr++; while(G.turnPtr<G.turnOrder.length && G.playerStates[G.turnOrder[G.turnPtr]].done) G.turnPtr++;
  if(G.turnPtr>=G.turnOrder.length) resolveRound(); else startTurn(); }

/* ---------- KI (Host) ---------- */
// Schätzt, ob ein anderer aktiver Spieler in dieser Runde schon mind. einen Schock garantiert hat
// (>=2 offen ausgelegte Einsen, oder bereits fertig mit Schock/Schock-Aus). Ein Schock schlägt
// immer General/Straße/Zahl, egal mit welcher Zahl er am Ende kombiniert wird.
function opponentGuaranteesSchockOrBetter(selfIdx){
  for(const i of G.turnOrder){
    if(i===selfIdx) continue;
    const p=G.playerStates[i]; if(!p||p.throwNum<1) continue;
    if(p.done&&p.combo){ if(p.combo.rank>=2050000) return true; continue; }
    const onesKept=p.dice.filter((d,k)=>p.kept[k]&&d===1).length;
    if(onesKept>=2) return true;
  }
  return false;
}
async function aiTurn(){
  const idx=cur(), ps=G.playerStates[idx]; $('controls').innerHTML=''; await sleep(420);
  try{ while(ps.throwNum<maxFor(ps) && !ps.done){
    await animRoll(idx); ps.mustRoll=false; aiKeep(idx); renderDice(); pushState();
    const ones=ps.dice.filter(d=>d===1).length;
    if(ones===3) break;
    if(ps.throwNum>=maxFor(ps)) break;
    if(canDrehen(ps)){ doDrehen(idx); renderDice(); pushState(); await sleep(480); continue; }
    const cc=evalDice(ps.dice,ps.throwNum);
    if(cc.rank<2050000 && opponentGuaranteesSchockOrBetter(idx)){
      // Aktuelles Ergebnis verliert ohnehin gegen einen sichtbar garantierten Gegner-Schock — alles neu versuchen
      ps.kept=[false,false,false]; await sleep(480); continue;
    }
    if(ps.dice.every(d=>d===ps.dice[0])) break;
    if(ps.kept.every(k=>k)) break;
    if(ps.throwNum===2 && cc.type!=='zahl') break;
    await sleep(480);
  } }catch(e){ console.error('aiTurn',e); }
  finishTurn(idx,false);
}
function aiKeep(idx){ const ps=G.playerStates[idx]; const c=[0,0,0,0,0,0,0]; ps.dice.forEach(d=>c[d]++); ps.kept=[false,false,false];
  const s=[...ps.dice].sort((a,b)=>a-b);
  if(s[1]===s[0]+1&&s[2]===s[1]+1){ ps.kept=[true,true,true]; return; } // fertige Straße (auch 1-2-3) immer sichern, nie wegen Einsen-Prioritaet zerlegen
  if(c[1]>=1){ ps.dice.forEach((d,i)=>{ if(d===1)ps.kept[i]=true; }); return; }
  let bv=2; for(let v=3;v<=6;v++){ if(c[v]>c[bv]||(c[v]===c[bv]&&v>bv)) bv=v; }
  if(c[bv]>=2){ ps.dice.forEach((d,i)=>{ if(d===bv)ps.kept[i]=true; }); return; }
  for(let v=2;v<=5;v++){ if(c[v]>=1&&c[v+1]>=1){ ps.dice.forEach((d,i)=>{ if(d===v||d===v+1) ps.kept[i]=true; }); return; } } // Beinahe-Straße: zwei aufeinanderfolgende Werte sichern, Rest neu wuerfeln
  let hi=0,hii=0; ps.dice.forEach((d,i)=>{ if(d>hi){hi=d;hii=i;} }); if(hi>=5)ps.kept[hii]=true; }

/* ---------- Runde auswerten (Host) ---------- */
function giveLids(toIdx,amount,fromIdx){ for(let k=0;k<amount;k++){ if(G.middleLids>0)G.middleLids--; else if(fromIdx!=null&&G.players[fromIdx].lids>0)G.players[fromIdx].lids--; else break; G.players[toIdx].lids++; if(G.players[toIdx].lids>=TOTAL_LIDS){G.players[toIdx].lids=TOTAL_LIDS;break;} } }
function resolveRound(){
  G.phase='summary'; const ids=G.turnOrder.slice();
  ids.forEach(i=>{ const ps=G.playerStates[i]; if(!ps.combo)ps.combo=evalDice(ps.dice,ps.throwNum||1); ps.concealed=false; });
  let win=ids[0],lose=ids[0];
  ids.forEach(i=>{ if(sortKey(G.playerStates[i])>sortKey(G.playerStates[win]))win=i; if(sortKey(G.playerStates[i])<sortKey(G.playerStates[lose]))lose=i; });
  const wc=G.playerStates[win].combo; let amountTxt;
  if(wc.type==='schockaus'){ G.players.forEach((p,k)=>{ if(k!==lose)p.lids=0; }); G.middleLids=0; G.players[lose].lids=TOTAL_LIDS; amountTxt='ALLE — volles Brett!'; playJingle1(); }
  else { giveLids(lose,wc.deckel,win); amountTxt=wc.deckel+' Deckel'; }
  vibe(30);
  let ev=''; if(wc.type==='schockaus')ev=EVENT.schockaus; else if(wc.type==='schock'&&wc.n===2)ev=EVENT.doof; else if(wc.type==='schock')ev=EVENT.schock; else if(wc.type==='general')ev=EVENT.general; else if(wc.type==='strasse')ev=EVENT.strasse;
  const _we=WIN_EMOJIS[Math.floor(Math.random()*WIN_EMOJIS.length)];
  const _le=LOSE_EMOJIS[Math.floor(Math.random()*LOSE_EMOJIS.length)];
  G.banner=`<span style="color:${playerColor(win)}">${_we} ${G.players[win].name} gewinnt!${ev?' · '+ev:''}</span><br><span style="color:${playerColor(lose)};font-size:.85em">${_le} ${G.players[lose].name} +${amountTxt}</span>`;
  paint(); pushState();
  // Bei Schock Aus mit vollem Brett: sofort prüfen ob Spiel vorbei
  // Alle Geräte setzen Timer (amHost-Check im Callback, nicht davor)
  const immediateEnd=wc.type==='schockaus'&&leader()>=0;
  const delay=immediateEnd?500:2700;
  setTimeout(()=>{ const _ended=checkPhaseEnd(); if(_ended&&_gameOverConfirmed){ try{_showGameOverOverlay();}catch(e){} } if(_ended)return; if(amHost){ G.starter=lose; G.round++; beginRound(); } },delay);
}

/* ---------- Phasen-Ende (Host) ---------- */
function leader(){ for(let i=0;i<G.players.length;i++){ if(G.players[i].lids>=TOTAL_LIDS) return i; } return -1; }
function resetLids(){ G.players.forEach(p=>p.lids=0); G.middleLids=TOTAL_LIDS; }
function checkPhaseEnd(){
  const li=leader(); if(li<0) return false;
  if(G.half===1){ G.halfLosers[0]=li; G.marker=li; resetLids(); G.half=2; G.starter=li; G.round=1; G.phase='notice';
    const _q1=pickHalfQuote(null);
    G.notice={title:'1. Hälfte beendet',text:`${G.players[li].name} verliert die 1. Hälfte, bekommt den 🔖 Marker und legt zur 2. Runde vor. Auf geht's!`,quote:_q1};
    playApplause(); paint(); pushState(); return true; }
  if(G.half===2){ G.halfLosers[1]=li;

function isTestName(n){ return /^test/i.test(n||''); }

/* ---------- Spiel beendet (Host) ---------- */
function onGameComplete(loserIdx,extra,isDoubleLoss){
  if(G.phase==='gameover'||G.phase==='kaiserover') return; // bereits abgeschlossen — kein erneutes Auslösen (Sound-Kette, Biersammler)
  const humans=G.players.filter(p=>!p.isAI&&!p.left).length;
  const realH=G.players.filter(p=>!p.isAI&&!isTestName(p.name));
  const showBier=realH.length>=2&&!G.players[loserIdx].isAI&&!isTestName(G.players[loserIdx].name);
  if(showBier) recordLoss(G.players[loserIdx].name);
  let kind='normal';
  if(G.kaiserrunde){ G.kaiserGamesPlayed++; if(G.kaiserGamesPlayed===1)kind='handoff'; else if(G.kaiserGamesPlayed>=2)kind='final'; }
  G.phase=(kind==='final')?'kaiserover':'gameover';
  const winnerIdx=G.players.reduce((best,_,i)=>i!==loserIdx&&!G.players[i].isAI?i:best,-1);
  const winLine=(kind==='final')?'👑 KAISERRUNDE VORBEI!':(isDoubleLoss?pick(DOUBLE_LOSS_LINES):pick(LOSER_LINES));
  G.over={loser:loserIdx,winner:winnerIdx>=0?winnerIdx:null,extra:extra||'',kind,comment:winLine,showBier};
  _gameOverConfirmed=true;
  vibe([60,40,60,40,120]); confetti();
  if(isDoubleLoss) playChain([oopsAudio,applauseAudio]); else playChain([jingle2Audio,applauseAudio,beerAudio]);
  paint(); pushState(); _ensureOverlay();
}
function newGameHost(){ _gameOverConfirmed=false; if(!amHost)return; if(G.over&&G.over.kind==='final'){ G.kaiserrunde=false; G.kaiserGamesPlayed=0; G.kaiserrundeBy=null; }
  const keep=G.kaiserrunde,by=G.kaiserrundeBy,pl=G.kaiserGamesPlayed; const players=G.players.map(p=>({name:p.name,isAI:p.isAI,cid:p.cid}));
  G=freshG(players); G.kaiserrunde=keep; G.kaiserrundeBy=by; G.kaiserGamesPlayed=pl; updateKaiser(); runLaden(); }

/* ---------- Kaiserrunde ---------- */
function applyKaiser(byCid){
  if(!amHost||!G)return;
  if(G.kaiserrunde){ if(G.kaiserGamesPlayed>=1){ return; } G.kaiserrunde=false; G.kaiserrundeBy=null; G.kaiserGamesPlayed=0; }
  else { const p=G.players.find(x=>x.cid===byCid); G.kaiserrunde=true; G.kaiserrundeBy=(p?p.name:(G.players.find(x=>!x.isAI)||G.players[0]).name); G.kaiserGamesPlayed=0; }
  updateKaiser(); pushState();
}
// Stellt sicher dass das Game-Over-Overlay sichtbar bleibt
let _lastAnnounceTs=0, _vlT=null, _vorlegerActive=false;
function showVorleger(name,col){ const cb=$('comboBig'); if(!cb)return; _vorlegerActive=true; cb.textContent=`${name} legt vor.`; cb.className='combo-big pop'; cb.style.color=col||'#ffd400'; clearTimeout(_vlT); _vlT=setTimeout(()=>{ _vorlegerActive=false; if(cb.textContent.endsWith('legt vor.')){ cb.classList.remove('pop'); cb.textContent=''; cb.style.color=''; } },2200); }
let _ovPolling=null, _ovBackup=null;
function _ensureOverlay(){
  if(_ovPolling) clearInterval(_ovPolling);
  _ovBackup=G&&G.over?{...G.over}:null;
  _ovPolling=setInterval(()=>{
    if(!_gameOverConfirmed){ clearInterval(_ovPolling); _ovPolling=null; return; }
    // Falls G zurückgesetzt → Gameover wiederherstellen
    if(G&&G.phase!=='gameover'&&G.phase!=='kaiserover'&&_ovBackup){
      G.phase='gameover'; G.over=_ovBackup;
      G.ts=Date.now(); try{ if(ONLINE) ROOM.child('state').set(sanitize(G)); }catch(e){}
    }
    _showGameOverOverlay(); // Direktaufruf — unabhängig von paint()
  },400);
  setTimeout(()=>{ if(_ovPolling){ clearInterval(_ovPolling); _ovPolling=null; } },15000);
}
function _showGameOverOverlay(){
  const ov=$('overlay'); if(!ov||!G||!G.over) return;
  const o=G.over;
  const wCol=o.winner!=null?playerColor(o.winner):'var(--gold)';
  const lCol=playerColor(o.loser);
  if(ov.classList.contains('on')) return; // schon sichtbar — nichts tun
  let h='';
  h+=`<div class="cmt" style="color:${lCol}">${o.comment}</div>`;
  h+=`<div class="lbl">${o.kind==='final'?'Verlierer der Kaiserrunde':'Verlierer'}</div>`;
  h+=`<div class="who" style="color:${lCol}">😳 ${G.players[o.loser].name}</div>`;
  if(o.winner!=null){
    h+=`<div class="ov-div"></div>`;
    h+=`<div class="lbl">Gewinner</div>`;
    h+=`<div class="who" style="color:${wCol}">🏆 ${G.players[o.winner].name}</div>`;
  }
  h+=bierBlockHTML();
  if(o.extra) h+=`<div class="ovx">${o.extra}</div>`;
  if(o.kind==='handoff') h+=`<div class="ovx" style="color:var(--gold);margin-top:8px">👑 Jetzt die Kaiserrunde — das letzte Spiel!</div>`;
  if(o.showBier) h+=`<div class="ovbier" id="ovBier"></div>`;
  h+=amHost?`<button class="btn" id="ovNew" style="max-width:280px;margin-top:14px">${o.kind==='handoff'?'Kaiserrunde starten 👑':'Neues Spiel'}</button>`:`<div class="ovx" style="margin-top:14px;opacity:.7">⏳ Host startet das nächste Spiel …</div>`;

/* ---------- Recovery / Simulation (Host) ---------- */
function advanceStuck(){
  if(!G) return false;
  if(G.phase==='summary'){
    const _li=leader(); const _half=G.half;
    toast(`Stuck: half=${_half} leader=${_li} amHost=${amHost}`,'warn');
    let _cpe=false;
    try{ _cpe=checkPhaseEnd(); }catch(e){ toast('⚠ '+e.message,'warn'); }
    if(_cpe){
      G.ts=Date.now(); try{ if(ONLINE) ROOM.child('state').set(sanitize(G)); }catch(e){}
      if(_gameOverConfirmed) _showGameOverOverlay(); _ensureOverlay(); return true;
    }
    // Kein Spielende — nächste Runde erzwingen
    toast('Neue Runde erzwungen.','ok');
    const nextP=G.turnOrder.find(i=>!G.players[i].isAI)??G.turnOrder[0];
    G.starter=nextP; G.round++; beginRound(); return true;
  }
  if(G.phase==='notice'){
    G.notice=null;
    if(amHost) beginRound();
    else { G.ts=Date.now(); try{if(ONLINE)ROOM.child('state').set(sanitize(G));}catch(e){} }
    return true;
  }
  if(G.phase==='gameover'||G.phase==='kaiserover'){
    G.ts=Date.now(); try{ if(ONLINE) ROOM.child('state').set(sanitize(G)); }catch(e){}
    paint(); _ensureOverlay(); return true;
  }
  const li=leader();
  if(li>=0&&(G.phase==='rolling'||G.phase==='laden')){
    if(checkPhaseEnd()){ toast('Festhänger behoben.','ok'); return true; }
  }
  return false;
}
function startRecovery(){ stopRecovery(); if(!amHost)return;
  recoveryTimer=setInterval(()=>{ if(!G)return;
    const age=Date.now()-(G.ts||0);
    if((G.phase==='summary'||G.phase==='notice'||G.phase==='gameover'||G.phase==='kaiserover')&&age>5000) advanceStuck();
    else if(G.phase==='rolling'||G.phase==='laden') advanceStuck();
  },4000);
}
function stopRecovery(){ if(recoveryTimer){ clearInterval(recoveryTimer); recoveryTimer=null; } }

function paint(){ if(!G)return; renderPhase(); renderPlayers(); renderTurnUI(); renderOverlays(); updateKaiser();
  if(G.roundAnnounce&&G.roundAnnounce.ts!==_lastAnnounceTs){
    _lastAnnounceTs=G.roundAnnounce.ts;
    const sN=G.players[G.roundAnnounce.starter]; if(sN) showVorleger(sN.name,playerColor(G.roundAnnounce.starter));
  }
  // comboBig leeren wenn neue Runde (kein banner, rolling/laden) — außer Vorleger-Ansage läuft gerade
  if((G.phase==='rolling'||G.phase==='laden')&&!G.banner&&!_vorlegerActive){
    const cb=$('comboBig'); if(cb){cb.innerHTML='';cb.className='combo-big';}
  }
}
function renderMitteBox(){ if(!G)return; const mn=$('middleNum'); if(mn)mn.textContent=G.middleLids; const ml=$('middleLids'); if(ml){ ml.innerHTML=Array.from({length:TOTAL_LIDS},(_,k)=>`<span class="lid${k<G.middleLids?' f':''}"></span>`).join(''); } }
function renderPhase(){ renderMitteBox(); let l='1. Hälfte'; if(G.half===2)l='2. Hälfte'; else if(G.half==='finale')l='Finale'; if(G.phase==='laden')l='Laden';
  const pl=$('phaseLabel'); pl.textContent=l; pl.style.fontWeight='900';
  const isHalf=l.endsWith('Hälfte'); pl.style.color=isHalf?'var(--red)':''; pl.style.webkitTextFillColor=isHalf?'var(--red)':''; }
function renderPlayers(){
  const box=$('players'); box.innerHTML='';
  G.players.forEach((p,i)=>{
    if(G.half==='finale'&&G.finalists&&G.finalists.length&&!G.finalists.includes(i)) return; if(p.left) return;
    const isTurn=(G.phase==='rolling'||G.phase==='laden')&&cur()===i;
    const ps=G.playerStates[i]; const lids=Array.from({length:TOTAL_LIDS},(_,k)=>`<span class="lid${k<p.lids?' f':''}"></span>`).join('');
    let res='',mini='',hid=''; const meCard=(i===myIdx()); const fullReveal=meCard||(ps&&ps.revealed)||(G.phase!=='rolling'&&G.phase!=='laden');
    if(ps){ if(ps.done&&ps.concealed&&!fullReveal){ hid='<div class="hidden-tag">🙈 verdeckt</div>'; }
      else if(ps.done&&fullReveal&&ps.combo){ res=ps.combo.label; mini='<div class="mini">'+ps.dice.map(d=>`<span class="md">${d}</span>`).join('')+'</div>'; }
      else if(!ps.done&&ps.throwNum===0&&ps.prevDice){ mini='<div class="mini">'+ps.prevDice.map(d=>`<span class="md">${d}</span>`).join('')+'</div>'; }
      else { if(ps.throwNum>=1){ const earlyFinish=ps.done&&ps.throwNum<maxFor(ps);
        mini='<div class="mini">'+ps.dice.map((d,k)=>(ps.kept[k]||fullReveal||earlyFinish)?`<span class="md">${d}</span>`:'<span class="md cov"></span>').join('')+'</div>'; }
        else if(ps.done) hid='<div class="hidden-tag">fertig</div>'; } }
    const col=playerColor(i);
    const card=document.createElement('div'); card.className='pc'+(isTurn?' active':'')+(p.lids>=TOTAL_LIDS?' lost':'');
    if(isTurn){ card.style.borderColor=col; card.style.boxShadow=`0 0 0 1.5px ${col},0 0 18px ${col}44`; }
    card.innerHTML=`<div class="cnt" style="color:${col}">${p.lids}</div>
      <div class="nm" style="color:${col}">${G.marker===i?'🔖 ':''}${p.name}${p.isAI?' <span class="ai">(KI)</span>':''}</div>
      <div class="turnflag" style="color:${col}">${isTurn&&meCard?'du bist dran ✦':(isTurn?(p.isAI?'würfelt…':'ist dran…'):'')}</div>
      <div class="lids" style="justify-content:center">${lids}</div>${mini}${hid}<div class="res" style="color:${col}">${res}</div>`;
    box.appendChild(card);
  });
}
function renderDice(){
  const idx=cur(), ps=G.playerStates[idx], me=(idx===myIdx());
  if(ps.throwNum===0){ $('dice').innerHTML=''; return; }
  $('dice').innerHTML=ps.dice.map((d,i)=>{ const reveal=me||ps.kept[i]; if(!reveal)return `<div class="die back"></div>`;
    return `<div class="die${d===1?' one':''}${ps.kept[i]?' kept':''}" data-i="${i}">${pips(d)}</div>`; }).join('');
  if(me && ps.throwNum>0 && (ps.throwNum<curMax()||ps.mustRoll)){
    [...$('dice').children].forEach(el=>{ if(el.dataset.i!=null) el.addEventListener('click',()=>actKeep(+el.dataset.i)); }); }
}

  $('thr').textContent=`Wurf ${G.playerStates[idx].throwNum} / ${curMax()}`;

function renderControls(){
  const idx=cur(), ps=G.playerStates[idx]; let h='';
  if(ps.throwNum===0){ h=`<button class="btn cyan" id="rollBtn">🎲 Würfeln</button>`; }
  else{ const last=ps.throwNum>=curMax(); const cd=canDrehen(ps); h='<div class="row">';
    if(!last&&!ps.mustRoll) h+=`<button class="btn ghost" id="doneBtn">Fertig</button>`;
    if(!last) h+=`<button class="btn cyan" id="rollBtn">${ps.mustRoll?'Weiter würfeln':'Nochmal ('+ps.throwNum+'/'+curMax()+')'}</button>`;
    if(last) h+=`<button class="btn" id="doneBtn">Zug beenden</button>`;
    if(cd) h+=`<button class="btn gold" id="drehBtn">6en drehen</button>`;
    h+='</div>'; }

function pickHalfQuote(finalistsIdx){
  let pool=HALF_QUOTES.filter(q=>q!==(G&&G._usedHalfQuote));
  if(finalistsIdx&&finalistsIdx.length===2){ pool=pool.concat([`${G.players[finalistsIdx[0]].name} gegen ${G.players[finalistsIdx[1]].name}, jetzt zeigt sich, wer die besseren Nerven hat.`]); }
  if(!pool.length) pool=HALF_QUOTES.slice();
  const q=pick(pool);
  if(G) G._usedHalfQuote=q;
  return q;

function confetti(){ const box=$('conf'); if(!box)return; const cols=['#ffd400','#173fb0','#2e6bff','#e2231a','#fff'];
  for(let i=0;i<90;i++){ const c=document.createElement('div'); c.className='cf'; c.style.left=Math.random()*100+'vw'; c.style.background=cols[i%cols.length]; c.style.animationDuration=(2.2+Math.random()*1.8)+'s'; c.style.animationDelay=(Math.random()*.5)+'s'; c.style.transform='rotate('+(Math.random()*360)+'deg)'; box.appendChild(c); setTimeout(()=>c.remove(),4200); } }

let lobbyCount=2;
$('counts').querySelectorAll('.opt').forEach(o=>o.addEventListener('click',()=>{ $('counts').querySelectorAll('.opt').forEach(x=>x.classList.remove('on')); o.classList.add('on'); lobbyCount=+o.dataset.c; }));
$('startBtn').addEventListener('click',enterRoom);
$('startMatchBtn').addEventListener('click',startMatch);
$('addTestBtn').addEventListener('click',addTestPlayer);
$('leaveRoomBtn').addEventListener('click',leaveRoom);

$('homeBtn').addEventListener('click',()=>{ if(ONLINE){ leaveRoom(); } else { showScreen('lobby'); } });
$('resyncBtn').addEventListener('click',()=>{ if(!amHost){ toast('Nur der Host kann synchronisieren.',''); return; } if(!G){ toast('Kein Spiel aktiv.',''); return; } if(!advanceStuck()) toast('Kein Festhänger erkannt.','ok'); });
$('cup').addEventListener('click',()=>{ if(!G||G.phase!=='rolling')return; const idx=cur(); if(!isMe(idx))return; const ps=G.playerStates[idx]; if(ps.mustRoll){ actRoll(); return; } if(ps.throwNum>=curMax())return; actRoll(); });
(function(){ const chip=$('middleBox'); let t=null; const s=()=>{ t=setTimeout(()=>{ if(amHost&&G){ const pool=participants(); const li=pool[Math.floor(Math.random()*pool.length)]; G.players[li].lids=TOTAL_LIDS; toast('⚙️ Spielende simuliert.','warn'); paint(); checkPhaseEnd(); } t=null; },800); }; const c=()=>{ if(t){clearTimeout(t);t=null;} };
  chip.addEventListener('pointerdown',s); chip.addEventListener('pointerup',c); chip.addEventListener('pointerleave',c); chip.addEventListener('pointercancel',c); })();

document.addEventListener('click',e=>{
  if(e.target.closest('#bierBtn')||e.target.closest('#bierBtnGame')){
    $('bierModal').classList.add('on');
    if(ONLINE){ try{ ROOM.child('biersammler').once('value',s=>{ const v=s.val(); if(v) SZ={settled:v.settled||{},games:v.games||[]}; renderBier('bierModalContent'); }); }catch(e){ renderBier('bierModalContent'); } }
    else renderBier('bierModalContent');
  }
  if(e.target.closest('#bierClose')||e.target.id==='bierModal') $('bierModal').classList.remove('on');
});
const _kt=$('kaiserToggle'); if(_kt) _kt.addEventListener('click',()=>{
  if(!G||!amHost){ if(G&&!amHost)sendSignal('kaiser'); return; }
  if(G.kaiserrunde){
    if(G.kaiserGamesPlayed>=1){ toast('Kaiserrunde läuft bereits.','warn'); return; }
    G.kaiserrunde=false; G.kaiserrundeBy=null; G.kaiserGamesPlayed=0; updateKaiser(); toast('Kaiserrunde abgewählt.',''); pushState();
  } else {
    const by=(G.players.find(p=>!p.isAI)||G.players[0]).name;
    G.kaiserrunde=true; G.kaiserrundeBy=by; G.kaiserGamesPlayed=0; updateKaiser(); pushState(); flashKaiser(by);
  }
});

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}

</script>
<div id="bierModal"><div class="bier-sheet"><button class="bier-close" id="bierClose">✕</button><h2>🍺 Biersammler</h2><div id="bierModalContent"></div></div></div>
</body>
</html>
